<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kroma — Sistema de Agendamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght=500;600;700&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16140f;
    --surface:#211d16;
    --surface-2:#2a2418;
    --border:#3a3226;
    --text:#ede6d6;
    --text-dim:#9c9384;
    --accent:#c9974a;
    --accent-dim:rgba(201,151,74,0.14);
    --danger:#a6432f;
    --danger-dim:rgba(166,67,47,0.16);
    --success:#6b8a52;
    --success-dim:rgba(107,138,82,0.16);
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    margin:0;
    padding:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
  }
  .app{width:100%;max-width:420px;}
  .stripe{
    height:5px;
    border-radius:3px;
    margin:10px 0 18px 0;
    background:repeating-linear-gradient(135deg,
      var(--accent) 0px, var(--accent) 10px,
      var(--danger) 10px, var(--danger) 20px,
      var(--text-dim) 20px, var(--text-dim) 22px,
      var(--danger) 22px, var(--danger) 32px,
      var(--accent) 32px, var(--accent) 42px);
    opacity:0.85;
  }
  h1,h2,h3{font-family:'Oswald',sans-serif;letter-spacing:0.3px;margin:0;}
  h1{font-size:24px;color:#fff;text-align:center;}
  .subtitle{color:var(--text-dim);font-size:13px;text-align:center;margin-top:2px;}
  .eyebrow{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .card{background:var(--surface);border:1px solid var(--border);padding:16px;border-radius:14px;margin-bottom:14px;}
  .card h3{font-size:15px;color:#fff;margin-bottom:10px;}
  .muted{color:var(--text-dim);font-size:12.5px;line-height:1.5;}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;}
  .btn-primary{background:var(--accent);color:#1a1509;}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
  .btn-danger{background:var(--danger-dim);color:#e5988a;border:1px solid rgba(166,67,47,0.4);}
  .btn-sm{width:auto;padding:8px 14px;font-size:12.5px;border-radius:8px;}
  input,select{
    width:100%;padding:12px;margin-bottom:10px;background:var(--bg);
    border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;
    font-family:'Inter',sans-serif;
  }
  input::placeholder{color:var(--text-dim);}
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;}
  .tab-btn{flex:1;white-space:nowrap;padding:10px 8px;border:none;border-radius:9px;background:var(--surface-2);color:var(--text-dim);font-weight:600;font-size:12.5px;cursor:pointer;font-family:'Inter',sans-serif;}
  .tab-btn.active{background:var(--accent);color:#1a1509;}
  ul{list-style:none;padding:0;margin:0;}
  li.item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13.5px;gap:8px;}
  li.item:last-child{border-bottom:none;}
  .badge{padding:4px 9px;border-radius:20px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
  .badge.green{background:var(--success-dim);color:#a6c48f;}
  .badge.gold{background:var(--accent-dim);color:var(--accent);}
  .mini-cards{display:flex;gap:10px;margin-bottom:14px;}
  .mini-card{flex:1;padding:14px;border-radius:12px;text-align:center;}
  .mini-card.green{background:var(--success-dim);color:#a6c48f;border:1px solid rgba(107,138,82,0.3);}
  .mini-card.gold{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(201,151,74,0.3);}
  .mini-card p{font-size:19px;font-weight:700;margin:4px 0 0 0;font-family:'Oswald',sans-serif;}
  .mini-card span{font-size:11px;}
  .grid-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .slot{padding:11px 4px;background:var(--surface-2);border-radius:9px;text-align:center;font-weight:600;font-size:13px;cursor:pointer;border:2px solid transparent;}
  .slot.ocupado{background:var(--bg);color:#4a453c;text-decoration:line-through;cursor:not-allowed;}
  .slot.livre:hover{border-color:var(--accent);}
  .slot.sel{background:var(--accent);color:#1a1509;border-color:var(--accent);}
  .pick-card{padding:12px;background:var(--surface-2);border-radius:10px;margin-bottom:8px;cursor:pointer;border:2px solid transparent;display:flex;justify-content:space-between;align-items:center;}
  .pick-card.sel{border-color:var(--accent);background:var(--accent-dim);}
  .pick-card .name{font-weight:600;font-size:14px;}
  .pick-card .price{color:var(--accent);font-weight:700;font-size:13px;font-family:'Oswald',sans-serif;}
  .linkbox{background:var(--surface-2);padding:12px;border-radius:10px;margin-bottom:10px;}
  .linkbox .url{font-size:11.5px;color:var(--text-dim);word-break:break-all;margin:6px 0 8px 0;font-family:monospace;}
  .role-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .role-toggle button{flex:1;}
  .empty{text-align:center;color:var(--text-dim);font-size:13px;padding:20px 0;}
  .top-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .shopname{color:#fff;font-size:15px;font-weight:600;font-family:'Oswald',sans-serif;}
  .rolebadge{font-size:10.5px;color:var(--text-dim);}
  .link-btn{background:none;border:none;color:var(--accent);font-size:12.5px;cursor:pointer;padding:0;font-weight:600;}
  .warn{background:var(--danger-dim);border:1px solid rgba(166,67,47,0.35);color:#e5988a;padding:10px 12px;border-radius:9px;font-size:12px;margin-bottom:12px;line-height:1.5;}
  .center-msg{text-align:center;padding:40px 10px;}
  .loading-dot{text-align:center;color:var(--text-dim);padding:60px 0;font-size:13px;}
  .del-x{background:none;border:none;color:#6b6459;font-size:16px;cursor:pointer;padding:0 2px;}
  .step-num{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#1a1509;font-size:11px;font-weight:700;align-items:center;justify-content:center;margin-right:8px;font-family:'Oswald',sans-serif;}
  .footer-note{text-align:center;color:#5c5648;font-size:10.5px;margin-top:6px;}
</style>
<!-- BIBLIOTECA DO SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app" id="app">
  <div class="loading-dot">Carregando…</div>
</div>

<script>
/* ============ CONEXÃO DO SUPABASE ============ */
const SUPABASE_URL = "https://pwbezybolmcmxkhlrwla.supabase.co";
const SUPABASE_KEY = "sb_publishable_49LRg9PEBlVGXsFG8R_vAQ_CZuwy0SD";
const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

  
    /* ============ CONFIG ============ */
const SLOT_INTERVAL = 30;
const SLOT_START = "09:00";
const SLOT_END = "19:00";
const LUNCH_START = "12:00";
const LUNCH_END = "13:00";
const DEFAULT_SERVICES = [
  {id:'s1', name:'Corte', price:35},
  {id:'s2', name:'Barba', price:25},
  {id:'s3', name:'Corte + Barba', price:55}
];


/* ============ FUNÇÕES ADAPTADAS PARA O BANCO DE DADOS (SUPABASE) ============ */
async function sGet(key){
  try{ 
    const { data, error } = await supabase
      .from('kroma_storage')
      .select('value')
      .eq('key', key)
      .maybeSingle();
    
    if (error) throw error;
    return data ? data.value : null; 
  } catch(e){ 
    console.error('Erro ao ler dados do Supabase:', e);
    return null; 
  }
}

async function sSet(key, value){
  try{ 
    const { error } = await supabase
      .from('kroma_storage')
      .upsert({ key: key, value: value }, { onConflict: 'key' });

    if (error) throw error;
    return true; 
  } catch(e){ 
    console.error('Erro ao salvar dados no Supabase:', e); 
    return false; 
  }
}

const shopKey = id => `shop:${id}`;
const apptKey = id => `appts:${id}`;

/* ============ UTIL ============ */
function esc(str){
  const d = document.createElement('div');
  d.innerText = (str===undefined||str===null) ? '' : String(str);
  return d.innerHTML;
}
function slugify(str){
  return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'loja';
}
function randSuffix(n){ return Math.random().toString(36).slice(2, 2+n); }
function genId(prefix){ return prefix + Date.now().toString(36) + randSuffix(3); }
function brl(n){ return 'R$ ' + (Number(n)||0).toFixed(2).replace('.', ','); }
function pad2(n){ return String(n).padStart(2,'0'); }
function isoDate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function todayISO(){ return isoDate(new Date()); }
function tomorrowISO(){ const d=new Date(); d.setDate(d.getDate()+1); return isoDate(d); }
function displayDate(iso){
  const [y,m,d] = iso.split('-');
  const label = iso===todayISO() ? 'Hoje' : (iso===tomorrowISO() ? 'Amanhã' : '');
  return label ? `${label} · ${d}/${m}` : `${d}/${m}`;
}
function timeToMinutes(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function generateSlots(){
  const slots=[];
  let cur = timeToMinutes(SLOT_START);
  const end = timeToMinutes(SLOT_END);
  const lunchStart = timeToMinutes(LUNCH_START);
  const lunchEnd = timeToMinutes(LUNCH_END);
  while(cur <= end){
    if(!(cur >= lunchStart && cur < lunchEnd)){
      slots.push(`${pad2(Math.floor(cur/60))}:${pad2(cur%60)}`);
    }
    cur += SLOT_INTERVAL;
  }
  return slots;
}
function phoneDigits(v){
  let d = (v||'').replace(/\D/g,'');
  if(d.length>0 && d.length<=11) d = '55'+d;
  return d;
}
function copyText(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    const old = btn.innerText;
    btn.innerText = 'Copiado ✓';
    setTimeout(()=> btn.innerText = old, 1500);
  }).catch(()=> alert('Não foi possível copiar. Selecione o link manualmente.'));
}
function baseUrl(){ return window.location.origin + window.location.pathname; }

/* ============ STATE ============ */
let STATE = {
  shopId: null,
  shop: null,
  appts: [],
  session: null, 
  loginRole: 'gestor',
  clientSel: { barberId:null, serviceId:null, date: todayISO(), hora:null },
  agendaDate: todayISO(),
  busy: false
};

const app = document.getElementById('app');

/* ============ INIT / ROUTER ============ */
async function init(){
  const params = new URLSearchParams(window.location.search);
  STATE.shopId = params.get('shop');
  const view = params.get('view');

  if(!STATE.shopId){
    renderLanding();
    return;
  }
  STATE.shop = await sGet(shopKey(STATE.shopId));
  if(!STATE.shop){
    renderShopNotFound();
    return;
  }
  STATE.appts = await sGet(apptKey(STATE.shopId)) || [];

  if(view === 'cliente'){
    renderCliente();
  } else {
    renderStaffLogin();
  }
}

async function refreshData(){
  STATE.shop = await sGet(shopKey(STATE.shopId));
  STATE.appts = await sGet(apptKey(STATE.shopId)) || [];
}

/* ============ LANDING (no shop) ============ */
function renderLanding(){
  app.innerHTML = `
    <header>
      <h1>💈 Kroma</h1>
      <p class="subtitle">Sistema de agendamento para barbearias</p>
      <div class="stripe"></div>
    </header>
    <div class="card">
      <h3>Criar minha barbearia</h3>
      <p class="muted">Cria um espaço único para sua barbearia, com link de agendamento pra bio do Instagram e acesso próprio pra cada barbeiro.</p>
      <input id="ln-nome" placeholder="Nome da barbearia">
      <input id="ln-senha" type="password" placeholder="Crie uma senha de gestor(a)">
      <button class="btn btn-primary" onclick="handleCreateShop()">Criar barbearia</button>
    </div>
    <div class="card">
      <h3>Já tenho uma barbearia</h3>
      <p class="muted">Entre com o código da sua loja (foi gerado quando você criou o cadastro).</p>
      <input id="ln-id" placeholder="Código da loja (ex: kroma-a1b2)">
      <button class="btn btn-outline" onclick="handleGoToShop()">Entrar</button>
    </div>
    <p class="footer-note">Protótipo funcional — dados salvos de forma 100% segura na nuvem com Supabase.</p>
  `;
}

function renderShopNotFound(){
  app.innerHTML = `
    <div class="center-msg">
      <h2>Loja não encontrada</h2>
      <p class="muted">Confira o código da barbearia no link.</p>
      <button class="btn btn-outline" style="margin-top:14px" onclick="window.location.href=baseUrl()">Voltar ao início</button>
    </div>
  `;
}

async function handleCreateShop(){
  const nome = document.getElementById('ln-nome').value.trim();
  const senha = document.getElementById('ln-senha').value;
  if(!nome || !senha) return alert('Preencha o nome da barbearia e a senha.');
  if(senha.length < 4) return alert('Use uma senha com pelo menos 4 caracteres.');

  const base = slugify(nome);
  const id = `${base}-${randSuffix(4)}`;
  const shop = {
    id, name: nome, gestorPassword: senha, whatsapp: '',
    services: DEFAULT_SERVICES.map(s=>({...s})),
    barbers: [],
    closedDates: [],
    createdAt: Date.now()
  };
  const ok1 = await sSet(shopKey(id), shop);
  const ok2 = await sSet(apptKey(id), []);
  if(!ok1 || !ok2) return alert('Erro ao criar a barbearia. Tente novamente.');

  renderShopCreated(shop);
}

function renderShopCreated(shop){
  const staffLink = `${baseUrl()}?shop=${shop.id}`;
  const clientLink = `${baseUrl()}?shop=${shop.id}&view=cliente`;
  app.innerHTML = `
    <header>
      <h1>💈 ${esc(shop.name)}</h1>
      <p class="subtitle">Barbearia criada com sucesso</p>
      <div class="stripe"></div>
    </header>
    <div class="card">
      <div class="eyebrow">Código da loja</div>
      <p style="font-family:'Oswald',sans-serif;font-size:18px;color:var(--accent);margin-bottom:12px;">${esc(shop.id)}</p>
      <p class="muted">Guarde este código — é ele que você usa para entrar depois.</p>
    </div>
    <div class="card">
      <h3>🔗 Link para a bio do Instagram (clientes)</h3>
      <div class="linkbox">
        <div class="url">${esc(clientLink)}</div>
        <button class="btn btn-sm btn-primary" onclick="copyText('${clientLink}', this)">Copiar link</button>
      </div>
      <h3 style="margin-top:14px">🔑 Link de acesso da equipe</h3>
      <div class="linkbox">
        <div class="url">${esc(staffLink)}</div>
        <button class="btn btn-sm btn-outline" onclick="copyText('${staffLink}', this)">Copiar link</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="window.location.href='${staffLink}'">Ir para o painel de gestão</button>
  `;
}

function handleGoToShop(){
  const id = document.getElementById('ln-id').value.trim();
  if(!id) return alert('Digite o código da loja.');
  window.location.href = `${baseUrl()}?shop=${encodeURIComponent(id)}`;
}

/* ============ STAFF LOGIN ============ */
function renderStaffLogin(){
  const shop = STATE.shop;
  const barberOptions = shop.barbers.map(b=>`<option value="${esc(b.id)}">${esc(b.name)}</option>`).join('');
  app.innerHTML = `
    <header>
      <h1>💈 ${esc(shop.name)}</h1>
      <p class="subtitle">Acesso da equipe</p>
      <div class="stripe"></div>
    </header>
    <div class="role-toggle">
      <button class="btn ${STATE.loginRole==='gestor'?'btn-primary':'btn-outline'}" onclick="setLoginRole('gestor')">Sou gestor(a)</button>
      <button class="btn ${STATE.loginRole==='barbeiro'?'btn-primary':'btn-outline'}" onclick="setLoginRole('barbeiro')">Sou barbeiro(a)</button>
    </div>
    <div class="card" id="login-card">
      ${STATE.loginRole === 'gestor' ? `
        <label>Senha de gestor(a)</label>
        <input id="lg-senha" type="password" placeholder="Senha">
        <button class="btn btn-primary" onclick="handleGestorLogin()">Entrar</button>
      ` : shop.barbers.length === 0 ? `
        <p class="muted">Nenhum barbeiro cadastrado ainda. Peça ao gestor para te cadastrar na aba Equipe.</p>
      ` : `
        <label>Seu nome</label>
        <select id="lb-id">${barberOptions}</select>
        <label>Seu PIN</label>
        <input id="lb-pin" type="password" inputmode="numeric" placeholder="PIN de 4 dígitos">
        <button class="btn btn-primary" onclick="handleBarberLogin()">Entrar</button>
      `}
    </div>
    <p class="footer-note">Loja: ${esc(shop.id)}</p>
  `;
}
function setLoginRole(role){ STATE.loginRole = role; renderStaffLogin(); }

function handleGestorLogin(){
  const senha = document.getElementById('lg-senha').value;
  if(senha !== STATE.shop.gestorPassword) return alert('Senha incorreta.');
  STATE.session = { type:'gestor' };
  STATE.agendaDate = todayISO();
  renderStaffApp('agenda');
}
function handleBarberLogin(){
  const id = document.getElementById('lb-id').value;
  const pin = document.getElementById('lb-pin').value;
  const barber = STATE.shop.barbers.find(b=>b.id===id);
  if(!barber || barber.pin !== pin) return alert('PIN incorreto.');
  STATE.session = { type:'barbeiro', id: barber.id, name: barber.name };
  STATE.agendaDate = todayISO();
  renderStaffApp('agenda');
}

function logout(){ STATE.session = null; renderStaffLogin(); }

/* ============ STAFF APP ============ */
let staffTab = 'agenda';
function renderStaffApp(tab){
  staffTab = tab || staffTab;
  const shop = STATE.shop;
  const isGestor = STATE.session.type === 'gestor';
  const tabs = isGestor
    ? [['agenda','📅 Agenda'],['caixa','💸 Caixa'],['equipe','✂️ Equipe'],['servicos','🏷️ Serviços'],['config','⚙️ Config']]
    : [['agenda','📅 Agenda']];

  app.innerHTML = `
    <header>
      <div class="top-actions">
        <div>
          <div class="shopname">${esc(shop.name)}</div>
          <div class="rolebadge">${isGestor ? 'Gestor(a)' : 'Barbeiro(a) · '+esc(STATE.session.name)}</div>
        </div>
        <button class="link-btn" onclick="logout()">Sair</button>
      </div>
      <div class="stripe"></div>
    </header>
    <div class="tabs">
      ${tabs.map(([id,label])=>`<button class="tab-btn ${staffTab===id?'active':''}" onclick="renderStaffApp('${id}')">${label}</button>`).join('')}
    </div>
    <div id="tab-body"></div>
  `;
  const body = document.getElementById('tab-body');
  if(staffTab==='agenda') body.innerHTML = tplStaffAgenda();
  if(staffTab==='caixa') body.innerHTML = tplCaixa();
  if(staffTab==='equipe') body.innerHTML = tplEquipe();
  if(staffTab==='servicos') body.innerHTML = tplServicos();
  if(staffTab==='config') body.innerHTML = tplConfig();
}

function apptsForView(dateISO){
  const isGestor = STATE.session.type === 'gestor';
  return STATE.appts
    .filter(a => a.date === dateISO)
    .filter(a => isGestor ? true : a.barberId === STATE.session.id)
    .sort((a,b)=> a.hora.localeCompare(b.hora));
}

function tplStaffAgenda(){
  const shop = STATE.shop;
  const isGestor = STATE.session.type === 'gestor';
  const dates = [todayISO(), tomorrowISO()];
  const closed = shop.closedDates.includes(STATE.agendaDate);
  const list = apptsForView(STATE.agendaDate);

  const barberOptions = isGestor
    ? shop.barbers.map(b=>`<option value="${esc(b.id)}">${esc(b.name)}</option>`).join('')
    : `<option value="${esc(STATE.session.id)}">${esc(STATE.session.name)}</option>`;

  const serviceOptions = shop.services.map(s=>`<option value="${esc(s.id)}">${esc(s.name)} — ${brl(s.price)}</option>`).join('');

  return `
    <div class="tabs">
      ${dates.map(d=>`<button class="tab-btn ${STATE.agendaDate===d?'active':''}" onclick="setAgendaDate('${d}')">${displayDate(d)}</button>`).join('')}
    </div>
    <div class="card">
      <h3>Agendamentos — ${displayDate(STATE.agendaDate)}</h3>
      ${closed ? `<p class="empty">🚫 Loja fechada neste dia.</p>` : (
        list.length===0 ? `<p class="empty">Nenhum horário marcado ainda.</p>` :
        `<ul>${list.map(a=>`
          <li class="item">
            <span><strong>${esc(a.hora)}</strong> — ${esc(a.cliente)} ${isGestor?`<br><span class="muted">${esc(a.barberName)} · ${esc(a.servicoNome)}</span>`:`<br><span class="muted">${esc(a.servicoNome)}</span>`}</span>
            <span style="display:flex;align-items:center;gap:8px;">
              <span class="badge ${a.origem==='Instagram'?'gold':'green'}">${esc(a.origem)}</span>
              <button class="del-x" onclick="deleteAppt('${a.id}')" title="Cancelar">✕</button>
            </span>
          </li>`).join('')}</ul>`
      )}
    </div>
    ${!closed ? `
    <div class="card">
      <h3>Agendar no balcão</h3>
      <input id="man-nome" placeholder="Nome do cliente">
      ${isGestor ? `<label>Barbeiro</label><select id="man-barbeiro" onchange="updateManualHours()">${barberOptions}</select>` : `<input type="hidden" id="man-barbeiro" value="${esc(STATE.session.id)}">`}
      <label>Serviço</label>
      <select id="man-servico">${serviceOptions}</select>
      <label>Horário</label>
      <select id="man-hora">${manualHoraOptions()}</select>
      <button class="btn btn-primary" onclick="handleManualAppt()">Salvar na agenda</button>
    </div>` : ''}
    ${isGestor ? `
    <div class="card">
      <h3>🔗 Links</h3>
      <div class="linkbox">
        <div class="eyebrow" style="margin-bottom:4px">Cliente (bio do Instagram)</div>
        <div class="url">${baseUrl()}?shop=${shop.id}&view=cliente</div>
        <button class="btn btn-sm btn-primary" onclick="copyText('${baseUrl()}?shop=${shop.id}&view=cliente', this)">Copiar</button>
      </div>
      <div class="linkbox">
        <div class="eyebrow" style="margin-bottom:4px">Equipe</div>
        <div class="url">${baseUrl()}?shop=${shop.id}</div>
        <button class="btn btn-sm btn-outline" onclick="copyText('${baseUrl()}?shop=${shop.id}', this)">Copiar</button>
      </div>
    </div>` : ''}
  `;
}
function manualHoraOptions(){
  const barberSel = document.getElementById('man-barbeiro');
  const barberId = barberSel ? barberSel.value : (STATE.session.type==='barbeiro' ? STATE.session.id : STATE.shop.barbers[0]?.id);
  const occupied = STATE.appts.filter(a=>a.date===STATE.agendaDate && a.barberId===barberId).map(a=>a.hora);
  return generateSlots().map(h=>`<option value="${h}" ${occupied.includes(h)?'disabled':''}>${h}${occupied.includes(h)?' (ocupado)':''}</option>`).join('');
}
function updateManualHours(){
  const selectHora = document.getElementById('man-hora');
  if(selectHora) selectHora.innerHTML = manualHoraOptions();
}
function setAgendaDate(d){ STATE.agendaDate = d; renderStaffApp('agenda'); }

async function handleManualAppt(){
  if(STATE.busy) return;
  const nome = document.getElementById('man-nome').value.trim();
  const barberId = document.getElementById('man-barbeiro').value;
  const servicoId = document.getElementById('man-servico').value;
  const hora = document.getElementById('man-hora').value;
  if(!nome) return alert('Digite o nome do cliente.');
  const barber = STATE.shop.barbers.find(b=>b.id===barberId) || (STATE.session.type==='barbeiro' ? {id:STATE.session.id, name:STATE.session.name} : null);
  const servico = STATE.shop.services.find(s=>s.id===servicoId);
  if(!barber) return alert('Selecione um barbeiro.');

  STATE.busy = true;
  await refreshData();
  if(STATE.appts.some(a=>a.date===STATE.agendaDate && a.barberId===barber.id && a.hora===hora)){
    STATE.busy = false;
    alert('Esse horário acabou de ser ocupado. Escolha outro.');
    return renderStaffApp('agenda');
  }
  STATE.appts.push({
    id: genId('a'), date: STATE.agendaDate, hora, barberId: barber.id, barberName: barber.name,
    cliente: nome, telefone:'', servicoId: servico.id, servicoNome: servico.name, preco: servico.price,
    origem: 'Balcão', criadoEm: Date.now()
  });
  await sSet(apptKey(STATE.shopId), STATE.appts);
  STATE.busy = false;
  renderStaffApp('agenda');
}

async function deleteAppt(id){
  if(!confirm('Cancelar este agendamento?')) return;
  await refreshData();
  STATE.appts = STATE.appts.filter(a=>a.id!==id);
  await sSet(apptKey(STATE.shopId), STATE.appts);
  renderStaffApp('agenda');
}

/* (O restante das funções internas permanece idêntico, gerido pelo novo sGet/sSet assíncronos) */
function tplCaixa(){
  const shop = STATE.shop;
  const dates = [todayISO(), tomorrowISO()];
  const rows = dates.flatMap(d => STATE.appts.filter(a=>a.date===d));
  const total = rows.reduce((s,a)=>s+(a.preco||0),0);
  const porBarbeiro = {};
  rows.forEach(a=>{ porBarbeiro[a.barberName] = (porBarbeiro[a.barberName]||0) + (a.preco||0); });
  const porServico = {};
  rows.forEach(a=>{ porServico[a.servicoNome] = (porServico[a.servicoNome]||0) + (a.preco||0); });

  return `
    <div class="mini-cards">
      <div class="mini-card gold"><span>Faturamento (hoje + amanhã)</span><p>${brl(total)}</p></div>
      <div class="mini-card green"><span>Agendamentos</span><p>${rows.length}</p></div>
    </div>
    <div class="card">
      <h3>Por barbeiro</h3>
      ${Object.keys(porBarbeiro).length===0 ? `<p class="empty">Sem dados ainda.</p>` :
        `<ul>${Object.entries(porBarbeiro).map(([n,v])=>`<li class="item"><span>${esc(n)}</span><span>${brl(v)}</span></li>`).join('')}</ul>`}
    </div>
    <div class="card">
      <h3>Por serviço</h3>
      ${Object.keys(porServico).length===0 ? `<p class="empty">Sem dados ainda.</p>` :
        `<ul>${Object.entries(porServico).map(([n,v])=>`<li class="item"><span>${esc(n)}</span><span>${brl(v)}</span></li>`).join('')}</ul>`}
    </div>
  `;
}

function tplEquipe(){
  const shop = STATE.shop;
  return `
    <div class="card">
      <h3>Barbeiros cadastrados</h3>
      ${shop.barbers.length===0 ? `<p class="empty">Nenhum barbeiro ainda.</p>` :
        `<ul>${shop.barbers.map(b=>`
          <li class="item">
            <span>${esc(b.name)}<br><span class="muted">PIN: ${esc(b.pin)}</span></span>
            <button class="del-x" onclick="removeBarber('${b.id}')" title="Remover">✕</button>
          </li>`).join('')}</ul>`}
    </div>
    <div class="card">
      <h3>Adicionar barbeiro</h3>
      <input id="nb-nome" placeholder="Nome do barbeiro">
      <input id="nb-pin" inputmode="numeric" maxlength="4" placeholder="PIN de 4 dígitos">
      <button class="btn btn-primary" onclick="handleAddBarber()">Adicionar</button>
    </div>
  `;
}
async function handleAddBarber(){
  const nome = document.getElementById('nb-nome').value.trim();
  const pin = document.getElementById('nb-pin').value.trim();
  if(!nome) return alert('Digite o nome do barbeiro.');
  if(!/^\d{4}$/.test(pin)) return alert('O PIN deve ter exatamente 4 números.');
  await refreshData();
  STATE.shop.barbers.push({ id: genId('b'), name: nome, pin });
  await sSet(shopKey(STATE.shopId), STATE.shop);
  renderStaffApp('equipe');
}
async function removeBarber(id){
  if(!confirm('Remover este barbeiro? Os agendamentos dele continuam salvos.')) return;
  await refreshData();
  STATE.shop.barbers = STATE.shop.barbers.filter(b=>b.id!==id);
  await sSet(shopKey(STATE.shopId), STATE.shop);
  renderStaffApp('equipe');
}

function tplServicos(){
  const shop = STATE.shop;
  return `
    <div class="card">
      <h3>Serviços e preços</h3>
      ${shop.services.length===0 ? `<p class="empty">Nenhum serviço cadastrado.</p>` :
        `<ul>${shop.services.map(s=>`
          <li class="item">
            <span>${esc(s.name)}</span>
            <span style="display:flex;align-items:center;gap:8px;">${brl(s.price)}
              <button class="del-x" onclick="removeService('${s.id}')" title="Remover">✕</button>
            </span>
          </li>`).join('')}</ul>`}
    </div>
    <div class="card">
      <h3>Adicionar serviço</h3>
      <input id="ns-nome" placeholder="Nome do serviço (ex: Sobrancelha)">
      <input id="ns-preco" type="number" step="0.01" placeholder="Preço (ex: 30.00)">
      <button class="btn btn-primary" onclick="handleAddService()">Adicionar</button>
    </div>
  `;
}
async function handleAddService(){
  const nome = document.getElementById('ns-nome').value.trim();
  const preco = parseFloat(document.getElementById('ns-preco').value);
  if(!nome) return alert('Digite o nome do serviço.');
  if(isNaN(preco) || preco < 0) return alert('Digite um preço válido.');
  await refreshData();
  STATE.shop.services.push({ id: genId('s'), name: nome, price: preco });
  await sSet(shopKey(STATE.shopId), STATE.shop);
  renderStaffApp('servicos');
}
async function removeService(id){
  if(!confirm('Remover este serviço?')) return;
  await refreshData();
  STATE.shop.services = STATE.shop.services.filter(s=>s.id!==id);
  await sSet(shopKey(STATE.shopId), STATE.shop);
  renderStaffApp('servicos');
}

function tplConfig(){
  const shop = STATE.shop;
  const dates = [todayISO(), tomorrowISO()];
  return `
    <div class="card">
      <h3>WhatsApp da barbearia</h3>
      <p class="muted">Usado no botão de confirmação que o cliente vê após agendar.</p>
      <input id="cf-zap" placeholder="Ex: 21999999999" value="${esc(shop.whatsapp||'')}">
      <button class="btn btn-outline" onclick="handleSaveWhatsapp()">Salvar</button>
    </div>
    <div class="card">
      <h3>Fechar a loja</h3>
      <p class="muted">Marque um dia para não aparecer disponível para os clientes.</p>
      ${dates.map(d=>`
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <input type="checkbox" style="width:auto;margin:0" ${shop.closedDates.includes(d)?'checked':''} onchange="toggleClosed('${d}', this.checked)">
          ${displayDate(d)} — fechado
        </label>
      `).join('')}
    </div>
  `;
}
async function handleSaveWhatsapp(){
  const zap = document.getElementById('cf-zap').value.trim();
  await refreshData();
  STATE.shop.whatsapp = zap;
  await sSet(shopKey(STATE.shopId), STATE.shop);
  alert('Salvo!');
  renderStaffApp('config');
}
async function toggleClosed(date, checked){
  await refreshData();
  const set = new Set(STATE.shop.closedDates);
  if(checked) set.add(date); else set.delete(date);
  STATE.shop.closedDates = Array.from(set);
  await sSet(shopKey(STATE.shopId), STATE.shop);
  renderStaffApp('config');
}

function renderCliente(){
  const shop = STATE.shop;
  const sel = STATE.clientSel;
  const dates = [todayISO(), tomorrowISO()];

  app.innerHTML = `
    <header>
      <h1>💈 ${esc(shop.name)}</h1>
      <p class="subtitle">Agende seu horário</p>
      <div class="stripe"></div>
    </header>

    <div class="card">
      <h3><span class="step-num">1</span>Escolha o profissional</h3>
      ${shop.barbers.length===0 ? `<p class="empty">Nenhum barbeiro disponível no momento.</p>` :
        shop.barbers.map(b=>`
          <div class="pick-card ${sel.barberId===b.id?'sel':''}" onclick="selectBarber('${b.id}')">
            <span class="name">${esc(b.name)}</span>
          </div>`).join('')}
    </div>

    <div class="card">
      <h3><span class="step-num">2</span>Escolha o serviço</h3>
      ${shop.services.map(s=>`
        <div class="pick-card ${sel.serviceId===s.id?'sel':''}" onclick="selectService('${s.id}')">
          <span class="name">${esc(s.name)}</span>
          <span class="price">${brl(s.price)}</span>
        </div>`).join('')}
    </div>

    <div class="card">
      <h3><span class="step-num">3</span>Escolha o dia</h3>
      <div class="tabs">
        ${dates.map(d=>`<button class="tab-btn ${sel.date===d?'active':''}" onclick="selectClientDate('${d}')">${displayDate(d)}</button>`).join('')}
      </div>
    </div>

    <div class="card">
      <h3><span class="step-num">4</span>Escolha o horário</h3>
      ${renderClientSlots()}
    </div>

    <div class="card">
      <h3><span class="step-num">5</span>Seus dados</h3>
      <input id="cl-nome" placeholder="Seu nome">
      <input id="cl-zap" type="tel" placeholder="Seu WhatsApp com DDD">
      <button class="btn btn-primary" onclick="handleClientConfirm()">Confirmar agendamento</button>
    </div>
  `;
}

function renderClientSlots(){
  const shop = STATE.shop;
  const sel = STATE.clientSel;
  if(shop.closedDates.includes(sel.date)){
    return `<p class="empty">🚫 A barbearia está fechada neste dia.</p>`;
  }
  if(!sel.barberId){
    return `<p class="empty">Escolha um profissional primeiro.</p>`;
  }
  const occupied = STATE.appts.filter(a=>a.date===sel.date && a.barberId===sel.barberId).map(a=>a.hora);
  return `<div class="grid-slots">${generateSlots().map(h=>{
    const isOcc = occupied.includes(h);
    const isSel = sel.hora===h;
    return `<div class="slot ${isOcc?'ocupado':'livre'} ${isSel?'sel':''}" ${isOcc?'':`onclick="selectClientHora('${h}')"`}>${h}</div>`;
  }).join('')}</div>`;
}

function selectBarber(id){ STATE.clientSel.barberId = id; STATE.clientSel.hora = null; renderCliente(); }
function selectService(id){ STATE.clientSel.serviceId = id; renderCliente(); }
function selectClientDate(d){ STATE.clientSel.date = d; STATE.clientSel.hora = null; renderCliente(); }
function selectClientHora(h){ STATE.clientSel.hora = h; renderCliente(); }

async function handleClientConfirm(){
  if(STATE.busy) return;
  const sel = STATE.clientSel;
  const nome = document.getElementById('cl-nome').value.trim();
  const zap = document.getElementById('cl-zap').value.trim();
  if(!sel.barberId) return alert('Escolha um profissional.');
  if(!sel.serviceId) return alert('Escolha um serviço.');
  if(!sel.hora) return alert('Escolha um horário.');
  if(!nome || !zap) return alert('Preencha seu nome e WhatsApp.');

  STATE.busy = true;
  await refreshData();
  if(STATE.shop.closedDates.includes(sel.date)){
    STATE.busy = false;
    alert('A barbearia fechou este dia enquanto você agendava. Escolha outro dia.');
    return renderCliente();
  }
  if(STATE.appts.some(a=>a.date===sel.date && a.barberId===sel.barberId && a.hora===sel.hora)){
    STATE.busy = false;
    alert('Esse horário acabou de ser reservado. Escolha outro.');
    return renderCliente();
  }
  const barber = STATE.shop.barbers.find(b=>b.id===sel.barberId);
  const servico = STATE.shop.services.find(s=>s.id===sel.serviceId);
  const appt = {
    id: genId('a'), date: sel.date, hora: sel.hora, barberId: barber.id, barberName: barber.name,
    cliente: nome, telefone: zap, servicoId: servico.id, servicoNome: servico.name, preco: servico.price,
    origem: 'Instagram', criadoEm: Date.now()
  };
  STATE.appts.push(appt);
  await sSet(apptKey(STATE.shopId), STATE.appts);
  STATE.busy = false;
  renderClientSuccess(appt, barber, servico);
}

function renderClientSuccess(appt, barber, servico){
  const shop = STATE.shop;
  const msg = encodeURIComponent(`Olá! Meu nome é ${appt.cliente}. Acabei de agendar ${servico.name} com ${barber.name} para ${displayDate(appt.date)} às ${appt.hora}. Confirmando! 💈`);
  const shopZap = phoneDigits(shop.whatsapp);
  app.innerHTML = `
    <header>
      <h1>💈 ${esc(shop.name)}</h1>
      <div class="stripe"></div>
    </header>
    <div class="card center-msg">
      <h2 style="color:var(--accent);margin-bottom:10px;">Agendamento reservado ✓</h2>
      <p class="muted" style="margin-bottom:16px;">${displayDate(appt.date)} às <strong>${appt.hora}</strong><br>${esc(servico.name)} com ${esc(barber.name)}</p>
      ${shopZap ? `
        <p class="muted" style="margin-bottom:10px;">Quer avisar a barbearia agora? Isso abre seu WhatsApp com uma mensagem pronta — você quem envia.</p>
        <a class="btn btn-primary" style="display:block;text-decoration:none;" href="https://wa.me/${shopZap}?text=${msg}\" target=\"_blank\">Enviar confirmação no WhatsApp</a>
      ` : `<p class="muted">Guarde a data e o horário. Nos vemos lá!</p>`}
      <button class="btn btn-outline" style="margin-top:10px" onclick="STATE.clientSel={barberId:null,serviceId:null,date:todayISO(),hora:null}; renderCliente();">Fazer novo agendamento</button>
    </div>
  `;
}

/* ============ START ============ */
init();
</script>
</body>
</html>
