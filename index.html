  /* Staff shell */

  /* Client */
  .client-hero{border-radius:34px;overflow:hidden;background:linear-gradient(155deg,rgba(255,255,255,.08),rgba(255,255,255,.025));border:1px solid var(--border);box-shadow:var(--shadow);position:relative}.client-cover{min-height:290px;padding:26px;display:flex;flex-direction:column;justify-content:flex-end;background:radial-gradient(circle at 30% 14%,rgba(215,169,87,.22),transparent 38%),linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.72))}.client-title{font-size:38px;line-height:1;font-weight:900;margin:12px 0 10px}.floating-cta{position:sticky;bottom:calc(14px + env(safe-area-inset-bottom));z-index:20;margin-top:16px}.info-list{display:grid;gap:10px}.info-row{display:flex;gap:10px;align-items:flex-start;color:var(--text-dim);font-size:13px}.quiz-shell{min-height:calc(100vh - 36px);display:flex;flex-direction:column}.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.progress{display:flex;gap:7px;margin:8px 0 18px}.progress span{height:5px;flex:1;border-radius:99px;background:rgba(255,255,255,.09)}.progress span.done{background:linear-gradient(90deg,var(--accent-2),var(--accent))}.quiz-card{animation:stepIn .22s ease both}@keyframes stepIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}.step-title{font-size:28px;line-height:1.06;font-weight:900;margin-bottom:8px}.step-sub{color:var(--text-dim);font-size:14px;line-height:1.5;margin-bottom:16px}.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.cal-header button{width:38px;height:38px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.045);color:var(--text);font-size:20px}.cal-header button:disabled{opacity:.28;cursor:not-allowed}.cal-month{font-weight:900}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.cal-wd{text-align:center;color:var(--muted);font-size:11px;font-weight:900;padding-bottom:4px}.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:14px;border:1px solid transparent;background:rgba(255,255,255,.045);font-size:13px;font-weight:800}.cal-day:not(.disabled):not(.empty){cursor:pointer}.cal-day.disabled{opacity:.22;background:transparent;cursor:not-allowed}.cal-day.today{border-color:rgba(215,169,87,.44)}.cal-day.sel{background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#171008}.cal-day.empty{visibility:hidden}.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.slot{min-height:44px;border-radius:15px;border:1px solid var(--border);background:rgba(255,255,255,.045);color:var(--text);font-weight:900}.slot.livre:hover{border-color:rgba(215,169,87,.55)}.slot.ocupado{opacity:.22;text-decoration:line-through;cursor:not-allowed}.slot.sel{background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#171008;border-color:transparent}.summary-box{display:grid;gap:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:22px;padding:15px;margin-bottom:14px}.summary-row{display:flex;justify-content:space-between;gap:12px;color:var(--text-dim);font-size:13px}.summary-row strong{color:var(--text);text-align:right}.success-mark{width:74px;height:74px;border-radius:26px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#171008;font-size:34px;font-weight:900;box-shadow:0 22px 60px rgba(215,169,87,.2);animation:pop .28s cubic-bezier(.2,1.4,.4,1) both}@keyframes pop{from{transform:scale(.72);opacity:0}to{transform:scale(1);opacity:1}}

<script>
  /* ============ CONEXÃO DO SUPABASE ============ */
  const SUPABASE_URL = "https://pwbezybolmcmxkhlrwla.supabase.co";
  const SUPABASE_KEY = "sb_publishable_49LRg9PEBlVGXsFG8R_vAQ_CZuwy0SD";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ============ CONFIG ============ */
  const SLOT_INTERVAL = 30;

  const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  /* ============ BANCO ============ */
  async function sGet(key){
    try{
      const { data, error } = await supabaseClient.from('kroma_storage').select('value').eq('key', key).maybeSingle();
      if(error) throw error;
      return data ? data.value : null;
    }catch(e){ console.error('Erro ao ler dados do Supabase:', e); return null; }
  }
  async function sSet(key, value){
    try{
      const { error } = await supabaseClient.from('kroma_storage').upsert({ key, value }, { onConflict:'key' });
      if(error) throw error;
      return true;
    }catch(e){ console.error('Erro ao salvar dados no Supabase:', e); return false; }
  }
  async function sListShops(){
    try{
      const { data, error } = await supabaseClient.from('kroma_storage').select('key,value').like('key','shop:%').limit(200);
      if(error) throw error;
      return data || [];
    }catch(e){ console.error('Erro ao listar empresas:', e); return []; }
  }
  const shopKey = id => `shop:${id}`;
  const apptKey = id => `appts:${id}`;
  const requestKey = () => 'company_requests';

  function normalizeRequest(req){
    return {
      id: req?.id || genId('req'),
      name: req?.name || '',
      slug: req?.slug || slugify(req?.name || ''),
      ownerName: req?.ownerName || '',
      whatsapp: req?.whatsapp || '',
      instagram: req?.instagram || '',
      city: req?.city || '',
      plan: req?.plan || 'Kroma Start',
      notes: req?.notes || '',
      status: req?.status || 'pending',
      createdAt: req?.createdAt || Date.now(),
      updatedAt: req?.updatedAt || Date.now(),
      shopId: req?.shopId || null,
      tempPassword: req?.tempPassword || null
    };
  }
  async function getAccessRequests(){
    const rows = await sGet(requestKey());
    return Array.isArray(rows) ? rows.map(normalizeRequest) : [];
  }
  async function setAccessRequests(rows){
    return await sSet(requestKey(), Array.isArray(rows) ? rows.map(normalizeRequest) : []);
  }
  async function companyNameAlreadyExists(slug){
    const target = slugify(slug || '');
    const shops = await sListShops();
    const shopDup = shops.some(r => {
      const v = r.value || {};
      return slugify(v.normalizedName || v.slug || v.name || r.key.replace('shop:','')) === target;
    });
    if(shopDup) return { exists:true, type:'company' };
    const requests = await getAccessRequests();
    const reqDup = requests.find(r => slugify(r.slug || r.name) === target && ['pending','approved'].includes(r.status));
    if(reqDup) return { exists:true, type:reqDup.status === 'pending' ? 'request_pending' : 'request_approved', request:reqDup };
    return { exists:false };
  }

  /* ============ UTIL ============ */
  function esc(str){ const d=document.createElement('div'); d.innerText=(str===undefined||str===null)?'':String(str); return d.innerHTML; }
  function slugify(str){ return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'loja'; }
  function randSuffix(n){ return Math.random().toString(36).slice(2,2+n); }
  function genId(prefix){ return prefix + Date.now().toString(36) + randSuffix(4); }
  function brl(n){ return 'R$ ' + (Number(n)||0).toFixed(2).replace('.', ','); }
  function pad2(n){ return String(n).padStart(2,'0'); }
  function isoDate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function todayISO(){ return isoDate(new Date()); }
  function tomorrowISO(){ const d=new Date(); d.setDate(d.getDate()+1); return isoDate(d); }
  function displayDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); const label=iso===todayISO()?'Hoje':(iso===tomorrowISO()?'Amanhã':''); return label ? `${label} · ${d}/${m}` : `${d}/${m}/${y}`; }
  function timeToMinutes(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
  function generateSlots(){ const slots=[]; let cur=timeToMinutes(SLOT_START), end=timeToMinutes(SLOT_END), ls=timeToMinutes(LUNCH_START), le=timeToMinutes(LUNCH_END); while(cur<=end){ if(!(cur>=ls && cur<le)) slots.push(`${pad2(Math.floor(cur/60))}:${pad2(cur%60)}`); cur+=SLOT_INTERVAL; } return slots; }
  function phoneDigits(v){ let d=(v||'').replace(/\D/g,''); if(d.length>0 && d.length<=11) d='55'+d; return d; }
  function baseUrl(){ return window.location.origin + window.location.pathname; }
  function initials(name){ return (name||'').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || 'K'; }
  function toast(msg){ const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
  function confirmKroma(message, onYes){
    const layer=document.createElement('div'); layer.className='confirm-layer';
    layer.innerHTML=`<div class="confirm-modal"><h3 class="section-title">Confirmar ação</h3><p class="muted" style="margin-bottom:16px">${esc(message)}</p><div class="row"><button class="btn btn-outline" id="c-no">Cancelar</button><button class="btn btn-danger" id="c-yes">Confirmar</button></div></div>`;
    document.body.appendChild(layer);
    layer.querySelector('#c-no').onclick=()=>layer.remove();
    layer.querySelector('#c-yes').onclick=()=>{layer.remove(); onYes && onYes();};
  }
  function copyText(text){ navigator.clipboard.writeText(text).then(()=>toast('Link copiado com sucesso.')).catch(()=>toast('Não foi possível copiar.')); }
  function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
  function isoFromParts(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }
  function buildMonthCells(y,m){ const start=new Date(y,m,1).getDay(); const total=daysInMonth(y,m); const cells=[]; for(let i=0;i<start;i++) cells.push(null); for(let d=1;d<=total;d++) cells.push(d); return cells; }
  function monthLabel(key){ const [y,m]=key.split('-'); return `${MONTH_NAMES[parseInt(m)-1]} ${y}`; }
  function setMode(mode){ app.className = `app app-${mode}`; }
  function avatarHTML(b, size){ return b && b.photo ? `<img class="avatar ${size||''}" src="${b.photo}" alt="${esc(b.name)}">` : `<div class="avatar ${size||''}">${esc(initials(b?.name))}</div>`; }
  function barberPortraitHTML(b){ return b && b.photo ? `<img class="barber-portrait" src="${b.photo}" alt="Foto de perfil de ${esc(b.name)}">` : `<div class="barber-portrait fallback">${esc(initials(b?.name))}</div>`; }
  function hasMasterSession(){ return sessionStorage.getItem('kromaMasterOk') === '1'; }
  function fileToCompressedDataURL(file,maxSize){ maxSize=maxSize||300; return new Promise((resolve,reject)=>{ const reader=new FileReader(); reader.onload=e=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; if(w>h && w>maxSize){h=h*(maxSize/w);w=maxSize;} else if(h>maxSize){w=w*(maxSize/h);h=maxSize;} const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); resolve(canvas.toDataURL('image/jpeg',.78)); }; img.onerror=reject; img.src=e.target.result; }; reader.onerror=reject; reader.readAsDataURL(file); }); }
  function sortServices(list){ return [...(list||[])].sort((a,b)=>{ const ca=CATEGORIA_ORDER[a.categoria]??9, cb=CATEGORIA_ORDER[b.categoria]??9; if(ca!==cb) return ca-cb; return (b.price||0)-(a.price||0); }); }
  function normalizeShop(shop){
    shop = shop || {};
    shop.services = (shop.services||[]).map(s=>({ duration:45, description:'', hidden:false, categoria:'outro', ...s }));
    shop.barbers = (shop.barbers||[]).map(b=>({ specialty:'Barbeiro especialista', bio:'Atendimento profissional com atenção aos detalhes.', instagram:'', experience:'', rating:4.9, ratingCount:0, favoriteStyle:'Degradê moderno', phone:'', active:true, ...b }));
    shop.closedDates = shop.closedDates || [];
    shop.dailyGoal = shop.dailyGoal || 1000;
    shop.tagline = shop.tagline || 'Cortes precisos. Atendimento premium. Experiência memorável.';
    return shop;
  }

  /* ============ STATE ============ */
  let STATE = { shopId:null, shop:null, appts:[], session:null, loginRole:'gestor', clientView:'landing', quizStep:1, clientSel:{barberId:null,serviceId:null,date:null,hora:null,calOffset:0}, agendaDate:todayISO(), caixaMonth:null, staffTab:'dashboard', busy:false };
  const app = document.getElementById('app');

  /* ============ INIT / ROUTER ============ */
  async function init(){
    const params = new URLSearchParams(window.location.search);
    if(params.get('view') === 'ceo' || params.get('view') === 'master'){ hasMasterSession() ? await renderMaster() : renderMasterLogin(); return; }
    STATE.shopId = params.get('shop');
    const view = params.get('view');
    if(!STATE.shopId){ renderHome(); return; }
    STATE.shop = normalizeShop(await sGet(shopKey(STATE.shopId)));
    if(!STATE.shop || !STATE.shop.id){ renderShopNotFound(); return; }
    STATE.appts = normalizeAppts(await sGet(apptKey(STATE.shopId))); 
    if(view === 'cliente'){ STATE.clientView='landing'; STATE.quizStep=1; renderCliente(); } else renderStaffLogin();
  }
  async function refreshData(){ STATE.shop = normalizeShop(await sGet(shopKey(STATE.shopId))); STATE.appts = normalizeAppts(await sGet(apptKey(STATE.shopId)));  }

  /* ============ HOME / CRIAÇÃO ============ */
  function renderHome(){
    setMode('home');
    app.innerHTML = `
      <div class="split">
        <section class="hero-card card">
          <div class="brand-mark">K</div>
          <div class="kicker">Cadastro fechado por aprovação</div>
          <h1 class="page-title">Kroma transforma barbearias em marcas digitais.</h1>
          <p class="soft" style="line-height:1.6">Acesso liberado por análise para garantir onboarding premium, evitar cadastros duplicados e acompanhar cada barbearia desde o primeiro dia.</p>
          <div class="hairline"></div>
          <div class="grid grid-3">
            <div><span class="badge gold">Presença</span><p class="muted" style="margin-top:8px">Página profissional para vender confiança.</p></div>
            <div><span class="badge green">Operação</span><p class="muted" style="margin-top:8px">Agenda, equipe, serviços e financeiro.</p></div>
            <div><span class="badge info">Aprovação</span><p class="muted" style="margin-top:8px">Toda empresa passa pelo Master da Kroma.</p></div>
          </div>
          <div class="insight" style="margin-top:18px">
            <strong>DNA Kroma:</strong><br>
            Ninguém entra na plataforma sem aprovação. Isso protege a marca, evita bagunça no banco e cria uma experiência mais premium para quem compra o direito de uso.
          </div>
          <div class="home-actions">
            <button class="btn btn-primary" onclick="document.getElementById('request-card').scrollIntoView({behavior:'smooth'})">Solicitar acesso</button>
            <button class="btn btn-outline" onclick="document.getElementById('existing-card').scrollIntoView({behavior:'smooth'})">Já sou cliente</button>
          </div>
        </section>
        <section class="stack">
          <div class="card" id="request-card">
            <div class="kicker">Nova barbearia</div>
            <h2 class="section-title">Solicitar acesso à Kroma</h2>
            <p class="muted" style="margin-bottom:16px">Preencha os dados da barbearia. A solicitação vai para o Painel Master do CEO e só vira empresa após aprovação.</p>
            <label>Nome da barbearia</label><input id="rq-nome" placeholder="Ex: Barbearia Wagner Studio">
            <label>Responsável</label><input id="rq-owner" placeholder="Nome de quem vai administrar">
            <label>WhatsApp</label><input id="rq-zap" inputmode="tel" placeholder="DDD + número">
            <div class="row">
              <div><label>Instagram</label><input id="rq-insta" placeholder="@suabarbearia"></div>
              <div><label>Cidade</label><input id="rq-city" placeholder="Ex: Ubá - MG"></div>
            </div>
            <label>Plano desejado</label>
            <select id="rq-plan">
              <option value="Kroma Start">Kroma Start</option>
              <option value="Kroma Pro">Kroma Pro</option>
              <option value="Kroma Premium">Kroma Premium</option>
              <option value="Ainda não decidi">Ainda não decidi</option>
            </select>
            <label>Observação</label><textarea id="rq-notes" placeholder="Conte rapidamente o que sua barbearia precisa melhorar: agenda, clientes novos, organização, presença digital..."></textarea>
            <button class="btn btn-primary" onclick="handleRequestAccess()">Enviar solicitação para análise</button>
          </div>
          <div class="card" id="existing-card">
            <div class="kicker">Acesso aprovado</div>
            <h2 class="section-title">Entrar em uma barbearia</h2>
            <p class="muted" style="margin-bottom:14px">Use o código da loja liberado pela Kroma após aprovação.</p>
            <label>Código da loja</label><input id="ln-id" placeholder="ex: barbearia-wagner-a1b2">
            <button class="btn btn-outline" onclick="handleGoToShop()">Entrar no painel</button>
          </div>
        </section>
      </div>
      <p class="footer-note">Protótipo com aprovação Master — dados reais salvos no mesmo Supabase.</p>`;
  }
  async function handleRequestAccess(){
    if(STATE.busy) return;
    const nome=document.getElementById('rq-nome').value.trim();
    const owner=document.getElementById('rq-owner').value.trim();
    const zap=document.getElementById('rq-zap').value.trim();
    const insta=document.getElementById('rq-insta').value.trim();
    const city=document.getElementById('rq-city').value.trim();
    const plan=document.getElementById('rq-plan').value;
    const notes=document.getElementById('rq-notes').value.trim();
    if(!nome || !owner || !zap) return toast('Preencha nome da barbearia, responsável e WhatsApp.');
    const slug=slugify(nome);
    STATE.busy=true;
    const dup = await companyNameAlreadyExists(slug);
    if(dup.exists){
      STATE.busy=false;
      if(dup.type==='company') return toast('Já existe uma empresa cadastrada com esse nome.');
      if(dup.type==='request_pending') return toast('Já existe uma solicitação pendente para essa barbearia.');
      return toast('Essa barbearia já possui solicitação aprovada.');
    }
    const requests = await getAccessRequests();
    const req = normalizeRequest({ id: genId('req'), name:nome, slug, ownerName:owner, whatsapp:zap, instagram:insta, city, plan, notes, status:'pending', createdAt:Date.now(), updatedAt:Date.now() });
    requests.unshift(req);
    const ok = await setAccessRequests(requests);
    STATE.busy=false;
    if(!ok) return toast('Não consegui enviar a solicitação. Verifique a chave do Supabase.');
    renderRequestCreated(req);
  }
  function renderRequestCreated(req){
    setMode('setup');

  /* Provisório/legado: a criação direta foi removida da interface.

  function renderShopCreated(shop){

  }
  function handleGoToShop(){ const id=document.getElementById('ln-id').value.trim(); if(!id) return toast('Digite o código da loja.'); window.location.href=`${baseUrl()}?shop=${encodeURIComponent(id)}`; }
  function renderShopNotFound(){ setMode('home'); app.innerHTML=`<div class="card hero-card" style="text-align:center"><div class="brand-mark" style="margin:auto">K</div><h1 class="page-title" style="font-size:34px">Loja não encontrada</h1><p class="muted" style="margin-bottom:18px">Confira o código da barbearia no link.</p><button class="btn btn-outline" onclick="window.location.href=baseUrl()">Voltar ao início</button></div>`; }

  /* ============ LOGIN STAFF ============ */
  function renderStaffLogin(){
    setMode('login'); const shop=STATE.shop; const barberOptions=shop.barbers.filter(b=>b.active!==false).map(b=>`<option value="${esc(b.id)}">${esc(b.name)}</option>`).join('');
    app.innerHTML=`<div class="card hero-card"><div class="topbar-left"><div class="brand-mark">K</div><div><div class="shopname">${esc(shop.name)}</div><div class="rolebadge">Acesso seguro da equipe</div></div></div><div class="hairline"></div><div class="row" style="margin-bottom:14px"><button class="btn ${STATE.loginRole==='gestor'?'btn-primary':'btn-outline'}" onclick="setLoginRole('gestor')">Gestor</button><button class="btn ${STATE.loginRole==='barbeiro'?'btn-primary':'btn-outline'}" onclick="setLoginRole('barbeiro')">Barbeiro</button></div>${STATE.loginRole==='gestor'?`<label>Senha de gestor</label><input id="lg-senha" type="password" placeholder="Senha"><button class="btn btn-primary" onclick="handleGestorLogin()">Entrar no painel</button>`:(shop.barbers.length===0?`<div class="empty">Nenhum barbeiro cadastrado ainda. Entre como gestor e cadastre a equipe.</div>`:`<label>Profissional</label><select id="lb-id">${barberOptions}</select><label>PIN</label><input id="lb-pin" type="password" inputmode="numeric" placeholder="PIN de 4 dígitos"><button class="btn btn-primary" onclick="handleBarberLogin()">Entrar na agenda</button>`)}<button class="btn btn-outline" style="margin-top:10px" onclick="window.location.href='${baseUrl()}?shop=${shop.id}&view=cliente'">Ver página do cliente</button><p class="footer-note">Loja: ${esc(shop.id)}</p></div>`;
  }
  function setLoginRole(role){ STATE.loginRole=role; renderStaffLogin(); }
  function handleGestorLogin(){ const senha=document.getElementById('lg-senha').value; if(senha!==STATE.shop.gestorPassword) return toast('Senha incorreta.'); STATE.session={type:'gestor'}; STATE.staffTab='dashboard'; STATE.agendaDate=todayISO(); renderStaffApp('dashboard'); }
  function handleBarberLogin(){ const id=document.getElementById('lb-id').value; const pin=document.getElementById('lb-pin').value; const barber=STATE.shop.barbers.find(b=>b.id===id); if(!barber || barber.pin!==pin) return toast('PIN incorreto.'); STATE.session={type:'barbeiro', id:barber.id, name:barber.name}; STATE.staffTab='agenda'; STATE.agendaDate=todayISO(); renderStaffApp('agenda'); }
  function logout(){ STATE.session=null; renderStaffLogin(); }

  /* ============ STAFF APP ============ */
  function staffTabs(){ return STATE.session.type==='gestor' ? [['dashboard','Dashboard'],['agenda','Agenda'],['caixa','Caixa'],['equipe','Equipe'],['servicos','Serviços'],['config','Página']] : [['agenda','Agenda']]; }
  function renderStaffApp(tab){
    setMode('staff'); STATE.staffTab = tab || STATE.staffTab; const shop=STATE.shop; const isGestor=STATE.session.type==='gestor'; const tabs=staffTabs();
    app.innerHTML=`<div class="staff-shell"><aside class="staff-sidebar card flat"><div class="topbar-left" style="margin-bottom:18px"><div class="brand-mark">K</div><div><div class="shopname">${esc(shop.name)}</div><div class="rolebadge">${isGestor?'Gestor':'Barbeiro · '+esc(STATE.session.name)}</div></div></div><div class="stack">${tabs.map(([id,label])=>`<button class="side-btn ${STATE.staffTab===id?'active':''}" onclick="renderStaffApp('${id}')"><span>${label}</span><span>›</span></button>`).join('')}</div><div class="hairline"></div><button class="side-btn" onclick="window.location.href='${baseUrl()}?shop=${shop.id}&view=cliente'">Página pública <span>↗</span></button><button class="side-btn" onclick="logout()">Sair <span>×</span></button></aside><main class="staff-main"><div class="topbar"><div class="topbar-left"><div class="brand-mark">K</div><div><div class="shopname">${esc(shop.name)}</div><div class="rolebadge">${isGestor?'Gestor':'Barbeiro · '+esc(STATE.session.name)}</div></div></div><button class="btn btn-sm btn-outline" onclick="logout()">Sair</button></div><div class="tabs staff-tabs-mobile">${tabs.map(([id,label])=>`<button class="tab-btn ${STATE.staffTab===id?'active':''}" onclick="renderStaffApp('${id}')">${label}</button>`).join('')}</div><div id="tab-body"></div></main></div>`;
    const body=document.getElementById('tab-body');
    if(STATE.staffTab==='dashboard') body.innerHTML=tplDashboard();
    if(STATE.staffTab==='agenda') body.innerHTML=tplStaffAgenda();
    if(STATE.staffTab==='caixa') body.innerHTML=tplCaixa();
    if(STATE.staffTab==='equipe') body.innerHTML=tplEquipe();
    if(STATE.staffTab==='servicos') body.innerHTML=tplServicos();
    if(STATE.staffTab==='config') body.innerHTML=tplConfig();
  }
  function apptsForDate(dateISO){ const isGestor=STATE.session.type==='gestor'; return STATE.appts.filter(a=>a.date===dateISO).filter(a=>isGestor?true:a.barberId===STATE.session.id).sort((a,b)=>a.hora.localeCompare(b.hora)); }
  function appointmentsToday(){ return STATE.appts.filter(a=>a.date===todayISO()); }
  function uniqueClients(list){ return new Set(list.map(a=>(a.telefone||a.cliente||'').toLowerCase())).size; }
  function topBarber(rows){ const map={}; rows.forEach(a=>{ map[a.barberName]=(map[a.barberName]||0)+(a.preco||0); }); const top=Object.entries(map).sort((a,b)=>b[1]-a[1])[0]; return top ? top[0] : '—'; }
  function onboardingScore(){ const s=STATE.shop; const checks=[s.name,s.whatsapp,s.instagram,s.address,s.hours,s.barbers.length>0,s.services.length>0]; return checks.filter(Boolean).length; }
  function tplDashboard(){
    const rows=appointmentsToday(); const revenue=rows.reduce((t,a)=>t+(a.preco||0),0); const goal=STATE.shop.dailyGoal||1000; const pct=Math.min(100,Math.round((revenue/goal)*100)); const next=rows.sort((a,b)=>a.hora.localeCompare(b.hora)).slice(0,4); const score=onboardingScore();
    return `<div class="section-head"><div><div class="kicker">Central de comando</div><h1 class="section-title">Bom dia. Hoje sua operação está assim.</h1><p class="muted">Visão executiva da barbearia para decisões rápidas.</p></div><button class="btn btn-sm btn-primary" onclick="renderStaffApp('agenda')">Novo agendamento</button></div><div class="metric-grid"><div class="metric"><span>Atendimentos hoje</span><strong>${rows.length}</strong><small>agenda do dia</small></div><div class="metric"><span>Faturamento previsto</span><strong>${brl(revenue)}</strong><small>${pct}% da meta</small></div><div class="metric"><span>Clientes únicos</span><strong>${uniqueClients(rows)}</strong><small>hoje</small></div><div class="metric"><span>Destaque</span><strong style="font-size:20px">${esc(topBarber(rows))}</strong><small>maior faturamento</small></div></div><div class="grid grid-2" style="margin-top:14px"><div class="card"><div class="section-head"><div><h2 class="section-title">Próximos horários</h2><p class="muted">Atendimentos de hoje em cards.</p></div></div>${next.length?next.map(a=>appointmentHTML(a,true)).join(''):`<div class="empty">Nenhum agendamento para hoje.</div>`}</div><div class="card"><h2 class="section-title">Presença digital</h2><p class="muted">Checklist para deixar sua página pública mais forte.</p><div class="hairline"></div><div class="metric"><span>Configuração concluída</span><strong>${score}/7</strong><small>complete os dados para vender melhor</small></div><div class="stack" style="margin-top:12px"><button class="btn btn-outline" onclick="renderStaffApp('config')">Ajustar página pública</button><button class="btn btn-outline" onclick="window.location.href='${baseUrl()}?shop=${STATE.shop.id}&view=cliente'">Visualizar como cliente</button></div></div></div>`;
  }
  function appointmentHTML(a, compact){ return `<div class="appointment-card"><div class="appt-line"><div><div class="appt-time">${esc(a.hora)}</div><div class="appt-client">${esc(a.cliente)}</div><p class="muted">${esc(a.servicoNome)} · ${esc(a.barberName)}</p></div><span class="badge ${a.origem==='Instagram'?'gold':'green'}">${esc(a.origem||'Agenda')}</span></div>${compact?'':`<div class="appt-actions"><button class="icon-action" onclick="toast('Recurso de remarcar entrará na próxima fase.')">Remarcar</button><button class="icon-action" onclick="toast('Pagamento será separado do agendamento na próxima fase.')">Receber</button><button class="icon-action" onclick="deleteAppt('${a.id}')">Cancelar</button></div>`}</div>`; }
  function manualHoraOptions(){ const barberSel=document.getElementById('man-barbeiro'); const barberId=barberSel?barberSel.value:(STATE.session.type==='barbeiro'?STATE.session.id:STATE.shop.barbers[0]?.id); const occupied=STATE.appts.filter(a=>a.date===STATE.agendaDate&&a.barberId===barberId).map(a=>a.hora); return generateSlots().map(h=>`<option value="${h}" ${occupied.includes(h)?'disabled':''}>${h}${occupied.includes(h)?' — ocupado':''}</option>`).join(''); }
  function updateManualHours(){ const selectHora=document.getElementById('man-hora'); if(selectHora) selectHora.innerHTML=manualHoraOptions(); }
  function tplStaffAgenda(){
    const shop=STATE.shop; const isGestor=STATE.session.type==='gestor'; const list=apptsForDate(STATE.agendaDate); const closed=shop.closedDates.includes(STATE.agendaDate); const barberOptions=isGestor?shop.barbers.filter(b=>b.active!==false).map(b=>`<option value="${esc(b.id)}">${esc(b.name)}</option>`).join(''):`<option value="${esc(STATE.session.id)}">${esc(STATE.session.name)}</option>`; const serviceOptions=sortServices(shop.services).filter(s=>!s.hidden).map(s=>`<option value="${esc(s.id)}">${esc(s.name)} — ${brl(s.price)}</option>`).join('');
    return `<div class="section-head"><div><div class="kicker">Agenda</div><h1 class="section-title">${displayDate(STATE.agendaDate)}</h1><p class="muted">Gerencie horários sem depender de tabelas.</p></div></div><div class="card flat" style="margin-bottom:14px"><div class="row"><button class="btn ${STATE.agendaDate===todayISO()?'btn-primary':'btn-outline'}" onclick="setAgendaDate('${todayISO()}')">Hoje</button><button class="btn ${STATE.agendaDate===tomorrowISO()?'btn-primary':'btn-outline'}" onclick="setAgendaDate('${tomorrowISO()}')">Amanhã</button><input type="date" id="agenda-date-picker" value="${STATE.agendaDate}" onchange="setAgendaDate(this.value)" style="margin:0"></div></div><div class="grid grid-2"><div class="card"><h2 class="section-title">Atendimentos</h2>${closed?`<div class="empty">A barbearia está fechada neste dia.</div>`:(list.length?list.map(a=>appointmentHTML(a,false)).join(''):`<div class="empty">Nenhum horário marcado ainda.</div>`)}</div>${!closed?`<div class="card"><h2 class="section-title">Agendar no balcão</h2><p class="muted" style="margin-bottom:14px">Crie um horário manual de forma rápida.</p><label>Cliente</label><input id="man-nome" placeholder="Nome do cliente">${isGestor?`<label>Barbeiro</label><select id="man-barbeiro" onchange="updateManualHours()">${barberOptions}</select>`:`<input type="hidden" id="man-barbeiro" value="${esc(STATE.session.id)}">`}<label>Serviço</label><select id="man-servico">${serviceOptions}</select><label>Horário</label><select id="man-hora">${manualHoraOptions()}</select><button class="btn btn-primary" onclick="handleManualAppt()">Salvar agendamento</button></div>`:''}</div>`;
  }
  function setAgendaDate(d){ STATE.agendaDate=d; renderStaffApp('agenda'); }
  async function handleManualAppt(){
    if(STATE.busy) return; const nome=document.getElementById('man-nome').value.trim(); const barberId=document.getElementById('man-barbeiro').value; const servicoId=document.getElementById('man-servico').value; const hora=document.getElementById('man-hora').value; if(!nome) return toast('Digite o nome do cliente.'); const barber=STATE.shop.barbers.find(b=>b.id===barberId)||{id:STATE.session.id,name:STATE.session.name}; const servico=STATE.shop.services.find(s=>s.id===servicoId); if(!barber||!servico) return toast('Selecione profissional e serviço.');
    STATE.busy=true; await refreshData(); if(STATE.appts.some(a=>a.date===STATE.agendaDate&&a.barberId===barber.id&&a.hora===hora)){ STATE.busy=false; toast('Esse horário acabou de ser ocupado.'); return renderStaffApp('agenda'); }
    STATE.appts.push({id:genId('a'),date:STATE.agendaDate,hora,barberId:barber.id,barberName:barber.name,cliente:nome,telefone:'',servicoId:servico.id,servicoNome:servico.name,preco:servico.price,origem:'Balcão',status:'confirmado',criadoEm:Date.now()});
    await sSet(apptKey(STATE.shopId),STATE.appts); STATE.busy=false; toast('Agendamento salvo.'); renderStaffApp('agenda');
  }
  function deleteAppt(id){ confirmKroma('Cancelar este agendamento? Ele será removido do protótipo atual.', async()=>{ await refreshData(); STATE.appts=STATE.appts.filter(a=>a.id!==id); await sSet(apptKey(STATE.shopId),STATE.appts); toast('Agendamento cancelado.'); renderStaffApp('agenda'); }); }

  /* ============ CAIXA ============ */
  function tplCaixa(){
    const now=new Date(); const curMonthKey=`${now.getFullYear()}-${pad2(now.getMonth()+1)}`; const allAppts=normalizeAppts(STATE.appts); const monthsSet=new Set(allAppts.map(a=>String(a.date||'').slice(0,7)).filter(Boolean)); monthsSet.add(curMonthKey); const months=Array.from(monthsSet).sort().reverse(); const selected=STATE.caixaMonth||curMonthKey; const todayRows=STATE.appts.filter(a=>a.date===todayISO()); const hojeTotal=todayRows.reduce((s,a)=>s+(a.preco||0),0); const rows=STATE.appts.filter(a=>a.date.slice(0,7)===selected); const total=rows.reduce((s,a)=>s+(a.preco||0),0); const ticket=rows.length?total/rows.length:0; const byService={}; rows.forEach(a=>byService[a.servicoNome]=(byService[a.servicoNome]||0)+(a.preco||0)); const max=Math.max(1,...Object.values(byService));
    return `<div class="section-head"><div><div class="kicker">Financeiro</div><h1 class="section-title">Caixa e previsão</h1><p class="muted">Nesta fase, receita ainda é baseada nos agendamentos.</p></div><select id="caixa-mes" onchange="setCaixaMonth(this.value)" style="max-width:220px;margin:0">${months.map(m=>`<option value="${m}" ${m===selected?'selected':''}>${monthLabel(m)}</option>`).join('')}</select></div><div class="metric-grid"><div class="metric"><span>Hoje</span><strong>${brl(hojeTotal)}</strong><small>previsão do dia</small></div><div class="metric"><span>Mês</span><strong>${brl(total)}</strong><small>${rows.length} atendimentos</small></div><div class="metric"><span>Ticket médio</span><strong>${brl(ticket)}</strong><small>por agendamento</small></div><div class="metric"><span>Pagamentos</span><strong style="font-size:18px">Próxima fase</strong><small>recebido x previsto</small></div></div><div class="grid grid-2" style="margin-top:14px"><div class="card"><h2 class="section-title">Serviços do mês</h2>${Object.keys(byService).length?`<div class="mini-chart">${Object.entries(byService).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([n,v])=>`<div class="bar" style="height:${Math.max(10,(v/max)*100)}%"><span>${esc(n).slice(0,3)}</span></div>`).join('')}</div>`:`<div class="empty">Sem dados neste mês.</div>`}</div><div class="card"><h2 class="section-title">Ranking</h2>${Object.keys(byService).length?Object.entries(byService).sort((a,b)=>b[1]-a[1]).map(([n,v])=>`<div class="appt-line" style="padding:10px 0;border-bottom:1px solid var(--border)"><span>${esc(n)}</span><strong>${brl(v)}</strong></div>`).join(''):`<div class="empty">Sem serviços vendidos.</div>`}</div></div>`;
  }
  function setCaixaMonth(m){ STATE.caixaMonth=m; renderStaffApp('caixa'); }

  /* ============ EQUIPE ============ */
  let nbPhotoData=null;
  function tplEquipe(){
    const shop=STATE.shop;
    return `<div class="section-head"><div><div class="kicker">Equipe</div><h1 class="section-title">Perfis profissionais</h1><p class="muted">O barbeiro vira autoridade, não apenas um nome na agenda.</p></div></div><div class="grid grid-2"><div class="card"><h2 class="section-title">Barbeiros cadastrados</h2>${shop.barbers.length?`<div class="grid">${shop.barbers.map(b=>`<div class="barber-card"><div class="head">${avatarHTML(b)}<div><strong>${esc(b.name)}</strong><p class="muted">${esc(b.specialty||'Barbeiro especialista')}</p></div></div><div class="barber-meta"><span class="pill">PIN ${esc(b.pin||'----')}</span><span class="pill">${esc(b.experience||'Experiência não informada')}</span><span class="pill">${b.active===false?'Inativo':'Ativo'}</span></div><p class="service-desc">${esc(b.bio||'')}</p><div class="row" style="margin-top:12px"><label class="filebtn">Foto<input type="file" accept="image/*" style="display:none" onchange="handleBarberPhoto('${b.id}',this)"></label><button class="btn btn-sm btn-outline" onclick="toggleBarber('${b.id}')">${b.active===false?'Ativar':'Ocultar'}</button><button class="del-x" onclick="removeBarber('${b.id}')">×</button></div></div>`).join('')}</div>`:`<div class="empty">Nenhum barbeiro cadastrado.</div>`}</div><div class="card"><h2 class="section-title">Adicionar barbeiro</h2><div class="row" style="align-items:center;margin-bottom:12px"><div class="avatar lg" id="nb-preview">+</div><label class="filebtn">Escolher foto<input type="file" accept="image/*" style="display:none" onchange="previewBarberPhoto(this)"></label></div><label>Nome</label><input id="nb-nome" placeholder="Nome do profissional"><label>Especialidade</label><input id="nb-specialty" placeholder="Ex: Degradê navalhado e barba"><label>Bio curta</label><textarea id="nb-bio" placeholder="Conte em uma frase o diferencial deste barbeiro"></textarea><div class="row"><div><label>Experiência</label><input id="nb-exp" placeholder="Ex: 8 anos"></div><div><label>PIN</label><input id="nb-pin" inputmode="numeric" maxlength="4" placeholder="1234"></div></div><label>Instagram</label><input id="nb-insta" placeholder="@profissional"><button class="btn btn-primary" onclick="handleAddBarber()">Adicionar profissional</button></div></div>`;
  }
  async function previewBarberPhoto(input){ if(!input.files||!input.files[0]) return; nbPhotoData=await fileToCompressedDataURL(input.files[0]); const prev=document.getElementById('nb-preview'); if(prev) prev.outerHTML=`<img class="avatar lg" id="nb-preview" src="${nbPhotoData}">`; }
  async function handleAddBarber(){ const nome=document.getElementById('nb-nome').value.trim(); const pin=document.getElementById('nb-pin').value.trim(); if(!nome) return toast('Digite o nome do barbeiro.'); if(!/^\d{4}$/.test(pin)) return toast('O PIN deve ter 4 números.'); await refreshData(); STATE.shop.barbers.push({id:genId('b'),name:nome,pin,photo:nbPhotoData||null,specialty:document.getElementById('nb-specialty').value.trim(),bio:document.getElementById('nb-bio').value.trim(),experience:document.getElementById('nb-exp').value.trim(),instagram:document.getElementById('nb-insta').value.trim(),rating:4.9,ratingCount:0,favoriteStyle:'Degradê moderno',active:true}); await sSet(shopKey(STATE.shopId),STATE.shop); nbPhotoData=null; toast('Profissional adicionado.'); renderStaffApp('equipe'); }
  async function handleBarberPhoto(id,input){ if(!input.files||!input.files[0]) return; const data=await fileToCompressedDataURL(input.files[0]); await refreshData(); const b=STATE.shop.barbers.find(x=>x.id===id); if(b) b.photo=data; await sSet(shopKey(STATE.shopId),STATE.shop); renderStaffApp('equipe'); }
  async function toggleBarber(id){ await refreshData(); const b=STATE.shop.barbers.find(x=>x.id===id); if(b) b.active = b.active===false; await sSet(shopKey(STATE.shopId),STATE.shop); renderStaffApp('equipe'); }
  function removeBarber(id){ confirmKroma('Remover este barbeiro? Os agendamentos antigos continuam no histórico do protótipo.', async()=>{ await refreshData(); STATE.shop.barbers=STATE.shop.barbers.filter(b=>b.id!==id); await sSet(shopKey(STATE.shopId),STATE.shop); toast('Barbeiro removido.'); renderStaffApp('equipe'); }); }

  /* ============ SERVIÇOS ============ */
  function tplServicos(){ const list=sortServices(STATE.shop.services); return `<div class="section-head"><div><div class="kicker">Serviços</div><h1 class="section-title">Cardápio premium</h1><p class="muted">Serviços com descrição, duração, categoria e status.</p></div></div><div class="grid grid-2"><div class="card"><h2 class="section-title">Serviços cadastrados</h2>${list.length?`<div class="service-grid">${list.map(s=>`<div class="service-card" id="srv-row-${s.id}"><div class="service-top"><div><span class="badge ${s.hidden?'red':'gold'}">${s.hidden?'Oculto':CATEGORIA_LABEL[s.categoria]||'Outro'}</span><h3 style="margin-top:10px">${esc(s.name)}</h3></div><div class="service-price">${brl(s.price)}</div></div><p class="service-desc">${esc(s.description||'Sem descrição.')}</p><div class="barber-meta"><span class="pill">${s.duration||45} min</span></div><div class="row" style="margin-top:12px"><button class="btn btn-sm btn-outline" onclick="editServiceInline('${s.id}')">Editar</button><button class="btn btn-sm btn-outline" onclick="duplicateService('${s.id}')">Duplicar</button><button class="del-x" onclick="removeService('${s.id}')">×</button></div></div>`).join('')}</div>`:`<div class="empty">Nenhum serviço cadastrado.</div>`}</div><div class="card"><h2 class="section-title">Novo serviço</h2><label>Nome</label><input id="ns-nome" placeholder="Ex: Corte degradê premium"><label>Categoria</label><select id="ns-categoria"><option value="corte">Corte</option><option value="barba">Barba</option><option value="tratamento">Tratamentos</option><option value="combo">Combos</option><option value="outro">Outros</option></select><div class="row"><div><label>Preço</label><input id="ns-preco" type="number" step="0.01" placeholder="55.00"></div><div><label>Duração</label><input id="ns-duracao" type="number" step="5" placeholder="45"></div></div><label>Descrição</label><textarea id="ns-desc" placeholder="Explique rapidamente o que está incluso."></textarea><button class="btn btn-primary" onclick="handleAddService()">Adicionar serviço</button></div></div>`; }
  function editServiceInline(id){ const s=STATE.shop.services.find(x=>x.id===id); const row=document.getElementById('srv-row-'+id); if(!row||!s)return; row.outerHTML=`<div class="edit-inline" id="srv-row-${id}"><label>Nome</label><input id="es-nome-${id}" value="${esc(s.name)}"><label>Categoria</label><select id="es-cat-${id}">${['corte','barba','tratamento','combo','outro'].map(c=>`<option value="${c}" ${s.categoria===c?'selected':''}>${CATEGORIA_LABEL[c]}</option>`).join('')}</select><div class="row"><div><label>Preço</label><input id="es-preco-${id}" type="number" step="0.01" value="${s.price}"></div><div><label>Duração</label><input id="es-dur-${id}" type="number" step="5" value="${s.duration||45}"></div></div><label>Descrição</label><textarea id="es-desc-${id}">${esc(s.description||'')}</textarea><label>Status</label><select id="es-hidden-${id}"><option value="false" ${!s.hidden?'selected':''}>Visível</option><option value="true" ${s.hidden?'selected':''}>Oculto</option></select><div class="small-btn-row"><button class="btn btn-primary btn-sm" onclick="saveServiceInline('${id}')">Salvar</button><button class="btn btn-outline btn-sm" onclick="renderStaffApp('servicos')">Cancelar</button></div></div>`; }
  async function saveServiceInline(id){ const nome=document.getElementById('es-nome-'+id).value.trim(); const preco=parseFloat(document.getElementById('es-preco-'+id).value); if(!nome||isNaN(preco)) return toast('Preencha nome e preço.'); await refreshData(); const s=STATE.shop.services.find(x=>x.id===id); if(s){ s.name=nome; s.price=preco; s.categoria=document.getElementById('es-cat-'+id).value; s.duration=parseInt(document.getElementById('es-dur-'+id).value)||45; s.description=document.getElementById('es-desc-'+id).value.trim(); s.hidden=document.getElementById('es-hidden-'+id).value==='true'; } await sSet(shopKey(STATE.shopId),STATE.shop); toast('Serviço atualizado.'); renderStaffApp('servicos'); }
  async function handleAddService(){ const nome=document.getElementById('ns-nome').value.trim(); const preco=parseFloat(document.getElementById('ns-preco').value); if(!nome||isNaN(preco)) return toast('Preencha nome e preço.'); await refreshData(); STATE.shop.services.push({id:genId('s'),name:nome,price:preco,categoria:document.getElementById('ns-categoria').value,duration:parseInt(document.getElementById('ns-duracao').value)||45,description:document.getElementById('ns-desc').value.trim(),hidden:false}); await sSet(shopKey(STATE.shopId),STATE.shop); toast('Serviço criado.'); renderStaffApp('servicos'); }
  async function duplicateService(id){ await refreshData(); const s=STATE.shop.services.find(x=>x.id===id); if(!s)return; STATE.shop.services.push({...s,id:genId('s'),name:s.name+' cópia',hidden:true}); await sSet(shopKey(STATE.shopId),STATE.shop); toast('Serviço duplicado como oculto.'); renderStaffApp('servicos'); }
  function removeService(id){ confirmKroma('Excluir este serviço? Para preservar histórico, prefira ocultar.', async()=>{ await refreshData(); STATE.shop.services=STATE.shop.services.filter(s=>s.id!==id); await sSet(shopKey(STATE.shopId),STATE.shop); renderStaffApp('servicos'); }); }

  /* ============ CONFIG ============ */
  function tplConfig(){ const s=STATE.shop; const clientLink=`${baseUrl()}?shop=${s.id}&view=cliente`; const closed=[...s.closedDates].sort(); return `<div class="section-head"><div><div class="kicker">Página pública</div><h1 class="section-title">Presença digital</h1><p class="muted">Ajustes que aparecem na landing page da barbearia.</p></div><button class="btn btn-sm btn-primary" onclick="window.location.href='${clientLink}'">Ver página</button></div><div class="grid grid-2"><div class="card"><h2 class="section-title">Identidade e contatos</h2><label>Frase de efeito</label><input id="cf-tagline" value="${esc(s.tagline||'')}"><label>Descrição</label><textarea id="cf-desc" placeholder="Uma breve descrição da barbearia">${esc(s.description||'')}</textarea><label>Endereço</label><input id="cf-endereco" value="${esc(s.address||'')}" placeholder="Rua, número, bairro"><label>Horário</label><input id="cf-horario" value="${esc(s.hours||'')}" placeholder="Seg a Sáb, 9h às 19h"><label>Instagram</label><input id="cf-insta" value="${esc(s.instagram||'')}" placeholder="@suabarbearia"><label>WhatsApp</label><input id="cf-zap" value="${esc(s.whatsapp||'')}" placeholder="DDD + número"><label>Meta diária</label><input id="cf-goal" type="number" value="${esc(s.dailyGoal||1000)}"><button class="btn btn-primary" onclick="handleSaveConfig()">Salvar página</button></div><div class="card"><h2 class="section-title">Links e agenda</h2><div class="linkbox"><span class="badge gold">Cliente</span><div class="url">${esc(clientLink)}</div><button class="btn btn-sm btn-outline" onclick="copyText('${clientLink}')">Copiar link</button></div><div class="hairline"></div><label>Fechar uma data</label><input type="date" id="cf-closedate"><button class="btn btn-outline" onclick="handleAddClosedDate()">Fechar data</button><div style="margin-top:14px">${closed.length?closed.map(d=>`<div class="appt-line" style="padding:10px 0;border-bottom:1px solid var(--border)"><span>${displayDate(d)}</span><button class="del-x" onclick="removeClosedDate('${d}')">×</button></div>`).join(''):`<div class="empty">Nenhum dia fechado.</div>`}</div></div></div>`; }
  async function handleSaveConfig(){ await refreshData(); STATE.shop.tagline=document.getElementById('cf-tagline').value.trim(); STATE.shop.description=document.getElementById('cf-desc').value.trim(); STATE.shop.address=document.getElementById('cf-endereco').value.trim(); STATE.shop.hours=document.getElementById('cf-horario').value.trim(); STATE.shop.instagram=document.getElementById('cf-insta').value.trim(); STATE.shop.whatsapp=document.getElementById('cf-zap').value.trim(); STATE.shop.dailyGoal=parseFloat(document.getElementById('cf-goal').value)||1000; await sSet(shopKey(STATE.shopId),STATE.shop); toast('Página atualizada.'); renderStaffApp('config'); }
  async function handleAddClosedDate(){ const val=document.getElementById('cf-closedate').value; if(!val)return toast('Escolha uma data.'); await refreshData(); STATE.shop.closedDates=Array.from(new Set([...(STATE.shop.closedDates||[]),val])); await sSet(shopKey(STATE.shopId),STATE.shop); renderStaffApp('config'); }
  async function removeClosedDate(d){ await refreshData(); STATE.shop.closedDates=STATE.shop.closedDates.filter(x=>x!==d); await sSet(shopKey(STATE.shopId),STATE.shop); renderStaffApp('config'); }

  /* ============ CLIENTE ============ */
  function renderCliente(){ setMode('client'); if(STATE.clientView==='quiz') renderQuiz(); else renderLandingPublic(); }
  function renderLandingPublic(){ const s=STATE.shop; const activeBarbers=s.barbers.filter(b=>b.active!==false); const visibleServices=sortServices(s.services).filter(x=>!x.hidden).slice(0,4); app.innerHTML=`<section class="client-hero"><div class="client-cover"><div class="brand-mark">${esc(initials(s.name).slice(0,1))}</div><h1 class="client-title">${esc(s.name)}</h1><p class="soft" style="line-height:1.55">${esc(s.tagline||'Agende seu horário em poucos segundos.')}</p><div class="barber-meta" style="margin-top:16px"><span class="pill">Página oficial</span><span class="pill">Agendamento online</span><span class="pill">Atendimento premium</span></div></div></section><div class="grid" style="margin-top:14px">${(s.address||s.hours||s.instagram||s.whatsapp)?`<div class="card"><h2 class="section-title">Informações</h2><div class="info-list">${s.address?`<div class="info-row"><strong>📍</strong><span>${esc(s.address)}</span></div>`:''}${s.hours?`<div class="info-row"><strong>🕒</strong><span>${esc(s.hours)}</span></div>`:''}${s.instagram?`<div class="info-row"><strong>IG</strong><span>${esc(s.instagram)}</span></div>`:''}${s.whatsapp?`<div class="info-row"><strong>WA</strong><span>${esc(s.whatsapp)}</span></div>`:''}</div></div>`:''}${activeBarbers.length?`<div class="card"><div class="section-head"><div><h2 class="section-title">Escolha pelo profissional, não por uma lista</h2><p class="muted">Fotos reais criam confiança. O cliente bate o olho, se identifica com o estilo e agenda com mais segurança.</p></div></div><div class="grid grid-2">${activeBarbers.map(b=>`<div class="barber-card barber-profile-card"><div class="barber-visual">${barberPortraitHTML(b)}</div><div class="barber-profile-body"><div class="barber-name-line"><div><strong>${esc(b.name)}</strong><p class="muted">${esc(b.specialty)}</p></div><span class="badge gold">⭐ ${b.rating||4.9}</span></div><p class="barber-human-note">${esc(b.bio)}</p><div class="barber-meta"><span class="pill">${esc(b.experience||'Especialista')}</span><span class="pill">${esc(b.favoriteStyle||'Estilo próprio')}</span>${b.instagram?`<span class="pill">${esc(b.instagram)}</span>`:''}</div></div></div>`).join('')}</div></div>`:''}${visibleServices.length?`<div class="card"><h2 class="section-title">Serviços em destaque</h2><div class="service-grid">${visibleServices.map(sv=>servicePublicCard(sv,false)).join('')}</div></div>`:''}</div><div class="floating-cta"><button class="btn btn-primary" onclick="startQuiz()">Agendar agora</button></div>`; }
  function servicePublicCard(s, pick){ return `<div class="service-card ${pick?'pick':''} ${STATE.clientSel.serviceId===s.id?'sel':''}" ${pick?`onclick="quizPickServico('${s.id}')"`:''}><div class="service-top"><div><span class="badge gold">${CATEGORIA_LABEL[s.categoria]||'Serviço'}</span><h3 style="margin-top:10px">${esc(s.name)}</h3></div><div class="service-price">${brl(s.price)}</div></div><p class="service-desc">${esc(s.description||'Serviço profissional da barbearia.')}</p><div class="barber-meta"><span class="pill">${s.duration||45} min</span></div></div>`; }
  function startQuiz(){ STATE.clientView='quiz'; STATE.quizStep=1; STATE.clientSel={barberId:null,serviceId:null,date:null,hora:null,calOffset:0}; renderCliente(); }
  function renderQuiz(){ const step=STATE.quizStep; app.innerHTML=`<div class="quiz-shell"><div class="quiz-top"><button class="btn btn-sm btn-outline" onclick="quizBack()">Voltar</button><span class="pill">${step}/4</span></div><div class="progress">${[1,2,3,4].map(i=>`<span class="${i<=step?'done':''}"></span>`).join('')}</div><div id="quiz-body" class="quiz-card"></div></div>`; const body=document.getElementById('quiz-body'); if(step===1) body.innerHTML=quizStepBarbeiro(); if(step===2) body.innerHTML=quizStepServico(); if(step===3) body.innerHTML=quizStepDiaHora(); if(step===4) body.innerHTML=quizStepDados(); }
  function quizBack(){ if(STATE.quizStep===1){ STATE.clientView='landing'; renderCliente(); return; } STATE.quizStep--; renderCliente(); }
  function quizStepBarbeiro(){ const list=STATE.shop.barbers.filter(b=>b.active!==false); return `<h1 class="step-title">Escolha seu profissional</h1><p class="step-sub">Conheça os barbeiros da equipe e escolha o profissional que mais combina com o estilo que você procura.</p>${list.length?`<div class="grid grid-2">${list.map(b=>`<div class="barber-card barber-profile-card pick ${STATE.clientSel.barberId===b.id?'sel':''}" onclick="quizPickBarber('${b.id}')"><div class="barber-visual">${barberPortraitHTML(b)}</div><div class="barber-profile-body"><div class="barber-name-line"><div><strong>${esc(b.name)}</strong><p class="muted">${esc(b.specialty)}</p></div><span class="badge gold">⭐ ${b.rating||4.9}</span></div><p class="barber-human-note">${esc(b.bio)}</p><div class="barber-meta"><span class="pill">${esc(b.favoriteStyle||'Estilo moderno')}</span><span class="pill">${esc(b.experience||'Especialista')}</span>${b.instagram?`<span class="pill">${esc(b.instagram)}</span>`:''}</div></div></div>`).join('')}</div>`:`<div class="empty">Nenhum profissional disponível no momento.</div>`}`; }
  function quizPickBarber(id){ STATE.clientSel.barberId=id; STATE.quizStep=2; renderCliente(); }
  function quizStepServico(){ const list=sortServices(STATE.shop.services).filter(s=>!s.hidden); return `<h1 class="step-title">Qual serviço combina com você?</h1><p class="step-sub">Serviços organizados por valor e categoria.</p>${list.length?`<div class="service-grid">${list.map(s=>servicePublicCard(s,true)).join('')}</div>`:`<div class="empty">Nenhum serviço disponível.</div>`}`; }
  function quizPickServico(id){ STATE.clientSel.serviceId=id; STATE.quizStep=3; renderCliente(); }
  function quizStepDiaHora(){ return `<h1 class="step-title">Escolha data e horário</h1><p class="step-sub">Dias indisponíveis ficam bloqueados. Selecione um horário livre.</p><div class="grid"><div class="card flat">${renderCalendarWidget()}</div><div class="card flat"><h2 class="section-title">Horários disponíveis</h2>${renderClientSlots()}</div></div>${STATE.clientSel.date&&STATE.clientSel.hora?`<div class="floating-cta"><button class="btn btn-primary" onclick="quizStep3Continue()">Continuar</button></div>`:''}`; }
  function quizStep3Continue(){ STATE.quizStep=4; renderCliente(); }
  function renderCalendarWidget(){ const now=new Date(); const y=now.getFullYear(); const base=now.getMonth(); const maxOffset=11-base; const offset=Math.min(STATE.clientSel.calOffset,maxOffset); const viewMonth=base+offset; const cells=buildMonthCells(y,viewMonth); const today=todayISO(); return `<div class="cal-header"><button onclick="calNav(-1)" ${offset<=0?'disabled':''}>‹</button><span class="cal-month">${MONTH_NAMES[viewMonth]} ${y}</span><button onclick="calNav(1)" ${offset>=maxOffset?'disabled':''}>›</button></div><div class="cal-grid">${WD_NAMES.map(w=>`<div class="cal-wd">${w}</div>`).join('')}${cells.map(d=>{ if(d===null)return`<div class="cal-day empty"></div>`; const iso=isoFromParts(y,viewMonth,d); const disabled=iso<today||STATE.shop.closedDates.includes(iso); return `<div class="cal-day ${disabled?'disabled':''} ${iso===today?'today':''} ${STATE.clientSel.date===iso?'sel':''}" ${disabled?'':`onclick="pickCalDate('${iso}')"`}>${d}</div>`; }).join('')}</div>`; }
  function calNav(dir){ const now=new Date(); const max=11-now.getMonth(); STATE.clientSel.calOffset=Math.max(0,Math.min(max,STATE.clientSel.calOffset+dir)); renderCliente(); }
  function pickCalDate(iso){ STATE.clientSel.date=iso; STATE.clientSel.hora=null; renderCliente(); }
  function renderClientSlots(){ const sel=STATE.clientSel; if(!sel.date)return`<div class="empty">Escolha uma data no calendário.</div>`; if(!sel.barberId)return`<div class="empty">Escolha um profissional primeiro.</div>`; const occupied=STATE.appts.filter(a=>a.date===sel.date&&a.barberId===sel.barberId).map(a=>a.hora); return `<div class="slot-grid">${generateSlots().map(h=>{ const occ=occupied.includes(h); return `<button class="slot ${occ?'ocupado':'livre'} ${sel.hora===h?'sel':''}" ${occ?'disabled':`onclick="selectClientHora('${h}')"`}>${h}</button>`; }).join('')}</div>`; }
  function selectClientHora(h){ STATE.clientSel.hora=h; renderCliente(); }
  function quizStepDados(){ const sel=STATE.clientSel; const barber=STATE.shop.barbers.find(b=>b.id===sel.barberId); const serv=STATE.shop.services.find(s=>s.id===sel.serviceId); return `<h1 class="step-title">Confirme seu agendamento</h1><p class="step-sub">Falta pouco. Confira os dados antes de reservar.</p><div class="summary-box"><div class="summary-row"><span>Profissional</span><strong>${esc(barber?.name)}</strong></div><div class="summary-row"><span>Serviço</span><strong>${esc(serv?.name)}</strong></div><div class="summary-row"><span>Data</span><strong>${displayDate(sel.date)}</strong></div><div class="summary-row"><span>Horário</span><strong>${esc(sel.hora)}</strong></div><div class="summary-row"><span>Valor</span><strong>${brl(serv?.price)}</strong></div></div><div class="card flat"><label>Seu nome</label><input id="cl-nome" placeholder="Nome completo"><label>WhatsApp</label><input id="cl-zap" type="tel" placeholder="DDD + número"><button class="btn btn-primary" onclick="handleClientConfirm()">Confirmar agendamento</button></div>`; }
  async function handleClientConfirm(){ if(STATE.busy)return; const sel=STATE.clientSel; const nome=document.getElementById('cl-nome').value.trim(); const zap=document.getElementById('cl-zap').value.trim(); if(!nome||!zap)return toast('Preencha nome e WhatsApp.'); STATE.busy=true; await refreshData(); if(STATE.appts.some(a=>a.date===sel.date&&a.barberId===sel.barberId&&a.hora===sel.hora)){ STATE.busy=false; toast('Esse horário acabou de ser reservado.'); STATE.quizStep=3; return renderCliente(); } const barber=STATE.shop.barbers.find(b=>b.id===sel.barberId); const servico=STATE.shop.services.find(s=>s.id===sel.serviceId); const appt={id:genId('a'),date:sel.date,hora:sel.hora,barberId:barber.id,barberName:barber.name,cliente:nome,telefone:zap,servicoId:servico.id,servicoNome:servico.name,preco:servico.price,origem:'Instagram',status:'pendente',criadoEm:Date.now()}; STATE.appts.push(appt); await sSet(apptKey(STATE.shopId),STATE.appts); STATE.busy=false; renderClientSuccess(appt,barber,servico); }
  function renderClientSuccess(appt,barber,servico){ const s=STATE.shop; const msg=encodeURIComponent(`Olá! Meu nome é ${appt.cliente}. Acabei de agendar ${servico.name} com ${barber.name} para ${displayDate(appt.date)} às ${appt.hora}. Confirmando!`); const zap=phoneDigits(s.whatsapp); app.innerHTML=`<div class="card hero-card" style="text-align:center"><div class="success-mark">✓</div><h1 class="page-title" style="font-size:34px">Agendamento confirmado.</h1><p class="muted" style="margin-bottom:16px">Seu horário foi reservado com sucesso.</p><div class="summary-box" style="text-align:left"><div class="summary-row"><span>Barbearia</span><strong>${esc(s.name)}</strong></div><div class="summary-row"><span>Profissional</span><strong>${esc(barber.name)}</strong></div><div class="summary-row"><span>Serviço</span><strong>${esc(servico.name)}</strong></div><div class="summary-row"><span>Quando</span><strong>${displayDate(appt.date)} às ${esc(appt.hora)}</strong></div></div>${zap?`<a class="btn btn-primary" href="https://wa.me/${zap}?text=${msg}" target="_blank">Enviar confirmação no WhatsApp</a>`:''}<button class="btn btn-outline" style="margin-top:10px" onclick="resetQuiz()">Fazer novo agendamento</button></div>`; }
  function resetQuiz(){ STATE.clientView='landing'; STATE.quizStep=1; STATE.clientSel={barberId:null,serviceId:null,date:null,hora:null,calOffset:0}; renderCliente(); }

  /* ============ MASTER KROMA ============ */
  function renderMasterLogin(){
    setMode('master');
    app.innerHTML=`<div class="card hero-card ceo-lock"><div class="brand-mark" style="margin-bottom:14px">K</div><div class="kicker">Acesso reservado</div><h1 class="page-title" style="font-size:36px">Painel CEO Kroma</h1><p class="muted" style="margin-bottom:16px">Esta área não aparece para barbearias, clientes ou equipe. O acesso Master deve ser usado somente pela liderança da Kroma Labs.</p><label>Código de acesso Master</label><input id="master-code" type="password" placeholder="Código do CEO" onkeydown="if(event.key==='Enter')handleMasterLogin()"><button class="btn btn-primary" onclick="handleMasterLogin()">Entrar no Painel Master</button><button class="btn btn-outline" style="margin-top:10px" onclick="window.location.href=baseUrl()">Voltar</button><p class="footer-note">Protótipo: link reservado em <strong>?view=ceo</strong>. Em produção: Supabase Auth + role KROMA_MASTER.</p></div>`;
  }
  function handleMasterLogin(){
    const code=(document.getElementById('master-code')?.value||'').trim();

  async function renderMaster(){ setMode('master'); const rows=await sListShops(); const shops=rows.map(r=>normalizeShop(r.value)).filter(s=>s&&s.id); const totalAppts='—'; app.innerHTML=`<div class="staff-shell"><aside class="staff-sidebar card flat"><div class="topbar-left"><div class="brand-mark">K</div><div><div class="shopname">Kroma Master</div><div class="rolebadge">Acesso exclusivo CEO</div></div></div><div class="hairline"></div><button class="side-btn active">Empresas <span>${shops.length}</span></button><button class="side-btn" onclick="toast('Assinaturas entram na próxima fase técnica.')">Assinaturas <span>›</span></button><button class="side-btn" onclick="toast('Logs entram após RLS/Auth.')">Logs <span>›</span></button></aside><main class="staff-main"><div class="topbar"><div><div class="kicker">Painel Master</div><h1 class="section-title">Controle das empresas Kroma</h1><p class="muted">Área executiva reservada. Na produção, este acesso será protegido por autenticação real, permissões e logs.</p></div><div class="row" style="width:auto"><button class="btn btn-sm btn-outline" onclick="copyText(baseUrl()+'?view=ceo')">Copiar link CEO</button><button class="btn btn-sm btn-outline" onclick="masterLogout()">Bloquear</button></div></div><div class="metric-grid"><div class="metric"><span>Empresas</span><strong>${shops.length}</strong><small>encontradas no storage</small></div><div class="metric"><span>MRR</span><strong style="font-size:18px">Futuro</strong><small>depende de planos</small></div><div class="metric"><span>Agendamentos</span><strong>${totalAppts}</strong><small>exige schema relacional</small></div><div class="metric"><span>Status</span><strong style="font-size:18px">Protótipo</strong><small>sem auth master</small></div></div><div class="card" style="margin-top:14px"><h2 class="section-title">Empresas</h2>${shops.length?shops.map(s=>`<div class="appointment-card"><div class="appt-line"><div><div class="appt-client">${esc(s.name)}</div><p class="mu   function normalizeShop(shop){
    shop = shop || {};

    shop.barbers = (shop.barbers||[]).map(b=>({ specialty:'Barbeiro especialista', bio:'Atendimento profissional com atenção aos detalhes.', instagram:'', experience:'', rating:4.9, ratingCount:0, favoriteStyle:'Degradê moderno', phone:'', active:true, photo:null, ...b }));

    shop.logo = shop.logo || '';
    shop.coverPhoto = shop.coverPhoto || '';
    shop.firstVisitOffer = shop.firstVisitOffer || 'Primeira visita com atendimento premium e finalização especial.';
    shop.mapUrl = shop.mapUrl || '';
    return shop;
  }



  function normalizeAppts(value){
    if(Array.isArray(value)) return value;
    if(value && Array.isArray(value.items)) return value.items;
    if(value && Array.isArray(value.appts)) return value.appts;
    return [];
  }

  function setupScore(shop){
    const checks = [shop.name, shop.logo, shop.coverPhoto, shop.whatsapp, shop.instagram, shop.address, shop.hours, shop.barbers&&shop.barbers.length, shop.services&&shop.services.length];
    return checks.filter(Boolean).length;
  }
  function setupTotal(){ return 9; }
  function isSetupOk(shop, key){
    if(key==='logo') return !!shop.logo;
    if(key==='cover') return !!shop.coverPhoto;
    if(key==='whatsapp') return !!shop.whatsapp;
    if(key==='instagram') return !!shop.instagram;
    if(key==='address') return !!shop.address;
    if(key==='hours') return !!shop.hours;
    if(key==='barbers') return (shop.barbers||[]).length>0;
    if(key==='services') return (shop.services||[]).length>0;
    if(key==='offer') return !!shop.firstVisitOffer;

  }

  function serviceDuration(serviceId){ const s=(STATE.shop?.services||[]).find(x=>x.id===serviceId); return s?.duration || 45; }
  function apptDuration(a){ return a.duracao || a.duration || serviceDuration(a.servicoId) || 45; }
  function timeRangesOverlap(startA,durA,startB,durB){ const a1=timeToMinutes(startA), a2=a1+durA, b1=timeToMinutes(startB), b2=b1+durB; return a1 < b2 && b1 < a2; }
  function slotFitsBusiness(hora,duration){ const st=timeToMinutes(hora), en=st+duration; const open=timeToMinutes(SLOT_START), close=timeToMinutes(SLOT_END); const ls=timeToMinutes(LUNCH_START), le=timeToMinutes(LUNCH_END); if(st<open || en>close) return false; if(st<le && en>ls) return false; return true; }
  function slotConflict(date, barberId, hora, duration){ return normalizeAppts(STATE.appts).some(a=> a && a.date===date && a.barberId===barberId && a.status!=='cancelado' && timeRangesOverlap(hora,duration,a.hora,apptDuration(a))); }
  function slotReason(date, barberId, hora, duration){ if(!slotFitsBusiness(hora,duration)) return 'Não cabe na duração do serviço'; if(slotConflict(date,barberId,hora,duration)) return 'Conflita com outro atendimento'; return ''; }

="window.location.href='${baseUrl()}?shop=${s.id}&view=cliente'">Ver landing</button></div></div>`}).join(''):`<div class="empty">Não foi possível listar empresas. Verifique Supabase e policies.</div>`}</div></div><div class="v5-card"><div class="v5-card-head"><div><div class="kicker">Próximas decisões CTO</div><h2>O que falta para SaaS real</h2><p>Esta tela mostra a direção da arquitetura final.</p></div></div><div class="pulse-list">${miniInsight('Auth e permissões','Supabase Auth, roles KROMA_MASTER e RLS por empresa.')}${miniInsight('Assinaturas','Planos, trials, inadimplência e bloqueio automático.')}${miniInsight('Logs e IA','Auditoria de ações sensíveis e controle de uso da IA por plano.')}${miniInsight('Banco relacional','Sair de kroma_storage e criar entidades reais por company_id.')}</div></div></div></div></main></div>`;
