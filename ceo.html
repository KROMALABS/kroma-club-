<style>
:root{
  --bg:#05070b;--panel:#0b1018;--panel-2:#101722;--panel-3:#141d2a;--line:rgba(255,255,255,.09);--line-strong:rgba(255,255,255,.16);

*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at top left,rgba(105,216,255,.12),transparent 34%),radial-gradient(circle at top right,rgba(232,195,106,.10),transparent 32%),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh}button,input,select{font-family:inherit}button{cursor:pointer}.app{width:min(1420px,100%);margin:0 auto;padding:18px}.gate{min-height:100vh;display:grid;place-items:center;padding:18px}.gate-card{width:min(520px,100%);border:1px solid var(--line);background:linear-gradient(155deg,rgba(255,255,255,.08),rgba(255,255,255,.025));box-shadow:var(--shadow);border-radius:34px;padding:26px;overflow:hidden;position:relative}.gate-card:before{content:"";position:absolute;right:-120px;top:-120px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(232,195,106,.22),transparent 67%)}.brand{display:flex;align-items:center;gap:12px;position:relative;z-index:1}.mark{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,var(--gold2),var(--gold));display:grid;place-items:center;color:#071018;font-weight:950;box-shadow:0 20px 60px rgba(232,195,106,.22)}.brand strong{display:block;font-size:17px}.brand span{font-size:12px;color:var(--muted);font-weight:700}.gate h1{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:clamp(34px,8vw,58px);line-height:.98;letter-spacing:-.07em;margin:38px 0 12px;position:relative;z-index:1}.muted{color:var(--muted);line-height:1.5}.soft{color:var(--soft)}.kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:900}.input,select{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);border-radius:16px;padding:14px 15px;font-size:14px;outline:none}.input:focus,select:focus{border-color:rgba(105,216,255,.55);box-shadow:0 0 0 4px rgba(105,216,255,.09)}label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin:14px 0 6px}.btn{border:0;border-radius:16px;padding:13px 16px;font-weight:900;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .18s var(--ease),border-color .18s var(--ease),background .18s var(--ease),box-shadow .18s var(--ease);min-height:46px}.btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#071018;box-shadow:0 18px 45px rgba(232,195,106,.18)}.btn-cyan{background:linear-gradient(135deg,#b8f0ff,var(--cyan));color:#061019}.btn-outline{background:rgba(255,255,255,.045);color:var(--text);border:1px solid var(--line)}.btn-danger{background:rgba(255,111,97,.1);color:#ffb8b1;border:1px solid rgba(255,111,97,.26)}.btn-sm{min-height:36px;padding:9px 12px;border-radius:13px;font-size:12px}.row{display:flex;gap:10px;align-items:center}.stack{display:grid;gap:12px}.master-shell{display:grid;grid-template-columns:280px minmax(0,1fr);gap:18px}.sidebar{position:sticky;top:18px;height:calc(100vh - 36px);border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));box-shadow:var(--shadow);padding:18px;overflow:auto}.side-nav{display:grid;gap:8px;margin-top:20px}.side-btn{width:100%;border:1px solid transparent;background:transparent;color:var(--soft);border-radius:16px;padding:13px 12px;text-align:left;font-weight:850;display:flex;justify-content:space-between;align-items:center}.side-btn:hover,.side-btn.active{background:rgba(255,255,255,.07);border-color:var(--line)}.side-btn.active{color:var(--gold)}.main{min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.topbar-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.live{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(99,224,173,.24);background:rgba(99,224,173,.08);color:#baf8dd;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:900}.live:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 6px rgba(99,224,173,.10)}.hero{border:1px solid var(--line);border-radius:38px;background:linear-gradient(145deg,rgba(255,255,255,.095),rgba(255,255,255,.03));box-shadow:var(--shadow);padding:24px;position:relative;overflow:hidden;margin-bottom:18px;animation:rise .35s var(--ease) both}.hero:before{content:"";position:absolute;inset:-140px -120px auto auto;width:330px;height:330px;border-radius:50%;background:radial-gradient(circle,rgba(105,216,255,.20),transparent 67%)}.hero:after{content:"";position:absolute;left:-120px;bottom:-160px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(232,195,106,.13),transparent 68%)}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr);gap:18px;align-items:stretch}.hero h1{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:clamp(34px,6vw,70px);line-height:.98;letter-spacing:-.075em;margin:12px 0}.story{font-size:clamp(16px,2vw,21px);line-height:1.48;color:var(--soft);font-weight:650;max-width:820px}.story strong{color:var(--text)}.hero-card{border:1px solid rgba(232,195,106,.20);background:linear-gradient(145deg,rgba(232,195,106,.14),rgba(255,255,255,.045));border-radius:30px;padding:18px}.hero-card span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:900}.hero-card strong{display:block;font-size:clamp(40px,7vw,76px);letter-spacing:-.08em;margin:6px 0 2px;font-family:'Plus Jakarta Sans',Inter}.hero-card small{color:var(--muted);font-weight:700}.grid{display:grid;gap:14px}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.metric{border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.048);padding:16px;min-height:142px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .18s var(--ease),border-color .18s var(--ease),background .18s var(--ease);animation:rise .42s var(--ease) both}.metric:hover{transform:translateY(-3px);border-color:rgba(105,216,255,.24);background:rgba(255,255,255,.065)}.metric span{color:var(--muted);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.09em}.metric strong{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:clamp(26px,4vw,42px);letter-spacing:-.06em}.metric small{color:var(--muted);line-height:1.45}.card{border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));box-shadow:0 16px 50px rgba(0,0,0,.18);padding:18px;animation:rise .42s var(--ease) both}.card-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:14px}.card h2{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:clamp(22px,3vw,34px);letter-spacing:-.055em;margin:5px 0 6px}.insight{border:1px solid rgba(105,216,255,.2);background:linear-gradient(135deg,rgba(105,216,255,.10),rgba(255,255,255,.035));border-radius:22px;padding:14px;color:var(--soft);line-height:1.48}.insight strong{color:var(--cyan)}.company-card{border:1px solid var(--line);background:rgba(255,255,255,.043);border-radius:24px;padding:15px;display:grid;gap:13px;transition:transform .18s var(--ease),border-color .18s var(--ease)}.company-card:hover{transform:translateY(-2px);border-color:rgba(232,195,106,.24)}.company-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.company-name{font-weight:950;font-size:17px}.company-id{font-size:11px;color:var(--muted);font-weight:800;word-break:break-all}.badges{display:flex;gap:7px;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.065);border:1px solid var(--line);color:var(--soft);font-size:11px;font-weight:900}.badge.green{color:#baf8dd;background:rgba(99,224,173,.08);border-color:rgba(99,224,173,.2)}.badge.gold{color:#ffe7a5;background:rgba(232,195,106,.09);border-color:rgba(232,195,106,.22)}.badge.red{color:#ffbeb7;background:rgba(255,111,97,.09);border-color:rgba(255,111,97,.22)}.badge.cyan{color:#b8f0ff;background:rgba(105,216,255,.08);border-color:rgba(105,216,255,.2)}.company-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.mini{border:1px solid var(--line);border-radius:18px;padding:10px;background:rgba(255,255,255,.035)}.mini span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:900}.mini strong{display:block;margin-top:5px;font-size:15px}.health{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.health span{display:block;height:100%;width:var(--w);border-radius:999px;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));animation:fill .6s var(--ease) both}@keyframes fill{from{width:0}to{width:var(--w)}}.table-like{display:grid;gap:8px}.risk{display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:12px 0}.risk:last-child{border-bottom:0}.risk strong{font-size:14px}.bar-chart{display:flex;align-items:flex-end;gap:8px;height:190px;padding-top:20px}.bar{flex:1;min-width:18px;border-radius:16px 16px 6px 6px;background:linear-gradient(180deg,var(--cyan),rgba(105,216,255,.16));height:var(--h);position:relative;animation:barIn .6s var(--ease) both}.bar:nth-child(even){background:linear-gradient(180deg,var(--gold),rgba(232,195,106,.14))}.bar:nth-child(3n){background:linear-gradient(180deg,var(--green),rgba(99,224,173,.14))}@keyframes barIn{from{height:0}to{height:var(--h)}}.toast{position:fixed;right:18px;bottom:18px;z-index:99;border:1px solid var(--line);background:rgba(11,16,24,.92);backdrop-filter:blur(18px);box-shadow:var(--shadow);padding:13px 15px;border-radius:18px;color:var(--text);font-weight:850;display:none}.toast.show{display:block;animation:toastIn .22s var(--ease) both}@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);z-index:80;display:none;align-items:center;justify-content:center;padding:18px}.modal{width:min(560px,100%);border:1px solid var(--line);background:linear-gradient(180deg,rgba(18,27,41,.96),rgba(9,13,20,.96));border-radius:30px;padding:20px;box-shadow:var(--shadow)}.modal-backdrop.show{display:flex}.empty{border:1px dashed var(--line-strong);background:rgba(255,255,255,.035);border-radius:24px;padding:22px;text-align:center;color:var(--muted);line-height:1.5}.section{display:none}.section.active{display:block}.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.filters .input{max-width:360px}.mobile-nav{display:none}.footer-note{font-size:11px;color:var(--muted);text-align:center;margin-top:auto;padding-top:16px}.danger-text{color:#ffbeb7}.success-text{color:#baf8dd}.cyan-text{color:#b8f0ff}.gold-text{color:#ffe7a5}
@media(max-width:1040px){.master-shell{grid-template-columns:1fr}.sidebar{display:none}.mobile-nav{display:flex;gap:8px;overflow:auto;margin-bottom:14px;position:sticky;top:0;z-index:40;background:linear-gradient(180deg,rgba(5,7,11,.96),rgba(5,7,11,.72));backdrop-filter:blur(14px);padding:10px 0}.mobile-nav .side-btn{white-space:nowrap;width:auto}.hero-inner,.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.company-stats{grid-template-columns:1fr 1fr}.topbar{align-items:flex-start;flex-direction:column}.topbar-actions{width:100%}.topbar-actions .btn{flex:1}.filters .input{max-width:none}.app{padding:12px}.hero{border-radius:30px;padding:18px}.card{border-radius:26px}.gate-card{padding:20px}}
@media(max-width:560px){.row{flex-direction:column;align-items:stretch}.company-top{display:grid}.company-stats{grid-template-columns:1fr 1fr}.bar-chart{height:150px}.btn{width:100%}.card-head{display:grid}.metric{min-height:118px}.hero-card strong{font-size:42px}}

<body>
<div id="app"></div><div id="toast" class="toast"></div><div id="modal" class="modal-backdrop"></div>
<script>
/* ================= CEO MASTER — KROMA LABS =================
   Painel Master conectado somente ao banco real do app atual.
   Sem modo demo. Produção: Supabase Auth + role KROMA_MASTER + RLS.
*/
const SUPABASE_URL = "https://pwbezybolmcmxkhlrwla.supabase.co";
const SUPABASE_KEY = "COLOQUE_AQUI_A_CHAVE_PUBLISHABLE_COPIADA_DO_SUPABASE";
const MASTER_ACCESS_CODE = "kroma-ceo-2026";
const MAIN_APP_FILE = "index.html";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const app = document.getElementById('app');
let STATE = { authed:false, loading:false, rows:[], companies:[], requests:[], apptsByCompany:{}, section:'dashboard', filter:'', status:'all', selected:null, lastError:null, dbMode:'real' };

function esc(str){ const d=document.createElement('div'); d.innerText=(str===undefined||str===null)?'':String(str); return d.innerHTML; }
function brl(n){ return 'R$ '+(Number(n)||0).toFixed(2).replace('.',','); }
function pad2(n){ return String(n).padStart(2,'0'); }
function isoDate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function todayISO(){ return isoDate(new Date()); }
function monthKey(){ const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function daysAgo(ts){ if(!ts) return 'sem registro'; const diff=Math.max(0,Date.now()-Number(ts)); const min=Math.floor(diff/60000); if(min<1) return 'agora'; if(min<60) return `há ${min} min`; const h=Math.floor(min/60); if(h<24) return `há ${h}h`; const d=Math.floor(h/24); return `há ${d}d`; }
function initials(name){ return (name||'K').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window.__toast); window.__toast=setTimeout(()=>t.classList.remove('show'),2600); }
function openModal(html){ const m=document.getElementById('modal'); m.innerHTML=`<div class="modal">${html}</div>`; m.classList.add('show'); }
function closeModal(){ const m=document.getElementById('modal'); m.classList.remove('show'); m.innerHTML=''; }
function baseDir(){ const p=window.location.pathname; return p.slice(0,p.lastIndexOf('/')+1); }
function companyLink(id){ return baseDir()+MAIN_APP_FILE+`?shop=${encodeURIComponent(id)}`; }
function landingLink(id){ return baseDir()+MAIN_APP_FILE+`?shop=${encodeURIComponent(id)}&view=cliente`; }
function copyText(text){ navigator.clipboard?.writeText(text).then(()=>toast('Copiado.')).catch(()=>toast('Não foi possível copiar.')); }
function isPlaceholderKey(){ return !SUPABASE_KEY || SUPABASE_KEY.includes('COLOQUE_AQUI'); }
function requestKey(){ return 'company_requests'; }
function slugify(str){ return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'loja'; }
function randSuffix(n){ return Math.random().toString(36).slice(2,2+n); }
function genId(prefix){ return prefix + Date.now().toString(36) + randSuffix(4); }
function tempPassword(){ return 'Kroma@' + Math.floor(1000 + Math.random()*9000); }
function normalizeRequest(req){
  return {
    id: req?.id || genId('req'),
    name: req?.name || '',
    slug: req?.slug || slugify(req?.name || ''),
    ownerName: req?.ownerName || '',
    whatsapp: req?.whatsapp || '',
    instagram: req?.instagram || '',
    city: req?.city || '',
    plan: req?.plan || 'Kroma Start',
    notes: req?.notes || '',
    status: req?.status || 'pending',
    createdAt: req?.createdAt || Date.now(),
    updatedAt: req?.updatedAt || Date.now(),
    approvedAt: req?.approvedAt || null,
    rejectedAt: req?.rejectedAt || null,
    shopId: req?.shopId || null,
    tempPassword: req?.tempPassword || null,
    rejectionReason: req?.rejectionReason || ''
  };
}
function defaultServices(){
  return [
    { id:'s1', name:'Corte Premium', price:35, categoria:'corte', duration:45, description:'Corte com acabamento refinado e finalização.', hidden:false },
    { id:'s2', name:'Barba Completa', price:25, categoria:'barba', duration:30, description:'Barba alinhada, toalha quente e acabamento.', hidden:false },
    { id:'s3', name:'Corte + Barba', price:55, categoria:'combo', duration:75, description:'Combo completo para sair pronto.', hidden:false }
  ];
}
function planValueFromName(plan){
  const p=(plan||'').toLowerCase();
  if(p.includes('premium')) return 197;
  if(p.includes('pro')) return 147;
  if(p.includes('start')) return 97;
  return 0;
}
function hasCompanySlug(slug){
  const target=slugify(slug);
  return STATE.companies.some(c=>slugify(c.shop?.normalizedName || c.shop?.slug || c.name || c.id) === target);
}
function duplicatePendingRequest(slug, ignoreId){
  const target=slugify(slug);
  return STATE.requests.find(r=>r.id!==ignoreId && ['pending','approved'].includes(r.status) && slugify(r.slug||r.name)===target);
}
async function saveRequests(){ await sSet(requestKey(), STATE.requests.map(normalizeRequest)); }

function renderGate(){
  app.innerHTML=`<div class="gate"><div class="gate-card"><div class="brand"><div class="mark">K</div><div><strong>Kroma Labs</strong><span>CEO Master V3 · Aprovações e dados reais</span></div></div><h1>Painel reservado do CEO.</h1><p class="story" style="font-size:16px">Cockpit conectado ao banco real da Kroma, com aprovação de empresas antes da criação. Sem modo demo e sem dados fictícios.</p><label>Código de acesso Master</label><input class="input" id="master-code" type="password" placeholder="Digite o código reservado" onkeydown="if(event.key==='Enter')handleMasterLogin()"><div class="row" style="margin-top:14px"><button class="btn btn-primary" onclick="handleMasterLogin()">Entrar no Master</button></div><p class="muted" style="font-size:12px;margin-top:16px">Protótipo: acesso local por código. Próxima fase: Supabase Auth + role KROMA_MASTER + RLS + logs de acesso.</p></div></div>`;
}
function handleMasterLogin(){
  const code=document.getElementById('master-code').value.trim();
  if(code!==MASTER_ACCESS_CODE) return toast('Código Master incorreto.');
  localStorage.setItem('kroma_master_ok','1');
  STATE.authed=true;
  loadMasterData();
}

async function sSet(key,value){ const {error}=await supabaseClient.from('kroma_storage').upsert({key,value},{onConflict:'key'}); if(error) throw error; }
async function loadMasterData(){
  STATE.loading=true;
  STATE.lastError=null;
  renderLoading();
  if(isPlaceholderKey()){
    STATE.loading=false;
    STATE.rows=[];
    STATE.companies=[];
    return renderSetupRequired('A chave pública do Supabase ainda não foi configurada neste arquivo.');
  }
  try{
    const {data,error}=await supabaseClient
      .from('kroma_storage')
      .select('key,value')
      .order('key', { ascending:true });
    if(error) throw error;
    buildFromRows(data||[]);
    STATE.loading=false;
    renderMaster();
    toast('Banco real sincronizado.');
  }catch(e){
    console.error(e);
    STATE.loading=false;
    STATE.lastError=e;
    STATE.rows=[];
    STATE.companies=[];
    renderDatabaseError(e);
  }
}
function renderLoading(){
  app.innerHTML=`<div class="gate"><div class="gate-card"><div class="brand"><div class="mark">K</div><div><strong>Kroma Labs</strong><span>Sincronizando Master</span></div></div><h1>Lendo empresas do banco real.</h1><p class="story">Conectando ao mesmo Supabase do sistema da barbearia e calculando as métricas reais do Master.</p><div class="insight" style="margin-top:16px"><strong>Status:</strong><br>Buscando chaves <code>shop:*</code> e <code>appts:*</code> na tabela <code>kroma_storage</code>.</div></div></div>`;
}
function renderSetupRequired(message){
  app.innerHTML=`<div class="gate"><div class="gate-card"><div class="brand"><div class="mark">K</div><div><strong>Kroma Labs</strong><span>Configuração necessária</span></div></div><h1>Master somente com dados reais.</h1><p class="story" style="font-size:16px">${esc(message)}</p><div class="insight" style="margin-top:16px"><strong>Como resolver:</strong><br>Abra o arquivo <code>ceo.html</code> e coloque a mesma chave publishable/anon usada no sistema principal em <code>SUPABASE_KEY</code>. Sem essa chave, o painel não mostra métricas.</div><div class="row" style="margin-top:16px"><button class="btn btn-primary" onclick="loadMasterData()">Tentar novamente</button><button class="btn btn-outline" onclick="logoutMaster()">Voltar</button></div></div></div>`;
}
function renderDatabaseError(e){
  const msg=e?.message||String(e||'Erro desconhecido');

}
function buildFromRows(rows){
  STATE.rows=rows||[]; const companies=[]; const apptsByCompany={};
  const reqRow = (rows||[]).find(r=>r && r.key===requestKey());
  STATE.requests = Array.isArray(reqRow?.value) ? reqRow.value.map(normalizeRequest).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)) : [];
  rows.forEach(r=>{ if(!r||!r.key) return; if(r.key.startsWith('appts:')){ const id=r.key.replace('appts:',''); apptsByCompany[id]=Array.isArray(r.value)?r.value:[]; } });
  rows.forEach(r=>{ if(!r||!r.key||!r.key.startsWith('shop:')) return; const v=r.value||{}; const id=v.id||r.key.replace('shop:',''); const appts=apptsByCompany[id]||[]; companies.push(normalizeCompany(v,id,appts)); });
  companies.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); STATE.companies=companies; STATE.apptsByCompany=apptsByCompany;
}
function normalizeCompany(shop,id,appts){
  const services=Array.isArray(shop.services)?shop.services:[];
  const barbers=Array.isArray(shop.barbers)?shop.barbers:[];
  const month=monthKey();
  const today=todayISO();
  const safeAppts=Array.isArray(appts)?appts:[];
  const monthAppts=safeAppts.filter(a=>(a.date||'').slice(0,7)===month);
  const todayAppts=safeAppts.filter(a=>a.date===today);
  const revenue=safeAppts.reduce((s,a)=>s+(Number(a.preco)||0),0);
  const monthRevenue=monthAppts.reduce((s,a)=>s+(Number(a.preco)||0),0);
  const online=safeAppts.filter(a=>{ const origem=(a.origem||'').toLowerCase(); return origem.includes('instagram')||origem.includes('online')||origem.includes('landing'); }).length;
  const onlineMonth=monthAppts.filter(a=>{ const origem=(a.origem||'').toLowerCase(); return origem.includes('instagram')||origem.includes('online')||origem.includes('landing'); }).length;
  const checklist=[!!shop.logo,!!shop.coverPhoto,!!shop.instagram,!!shop.whatsapp,barbers.length>0,services.length>0,!!shop.description,!!shop.hours,!!shop.tagline];
  const presence=Math.round((checklist.filter(Boolean).length/checklist.length)*100);
  const profileQuality=Math.round(((barbers.filter(b=>b.photo).length/(barbers.length||1))*50)+((barbers.filter(b=>b.bio&&b.specialty).length/(barbers.length||1))*50));
  let status=shop.status||shop.subscriptionStatus||'active';
  if(status==='blocked') status='blocked';
  const plan=shop.planName||shop.plan||'Sem plano';
  const rawPlanValue=(shop.planValue??shop.mrr??shop.subscriptionValue??null);
  const planValue=rawPlanValue===null||rawPlanValue==='' ? 0 : Number(rawPlanValue)||0;
  const hasPlanValue=planValue>0;
  const lastAppt=safeAppts.slice().sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0))[0];
  const risks=[];
  if(!shop.logo) risks.push('sem logo');
  if(!shop.coverPhoto) risks.push('sem foto da fachada');
  if(!shop.whatsapp) risks.push('sem WhatsApp');
  if(!shop.instagram) risks.push('sem Instagram');
  if(barbers.length===0) risks.push('sem equipe');
  if(services.length===0) risks.push('sem serviços');
  if(profileQuality<60&&barbers.length) risks.push('perfis fracos');
  if(safeAppts.length===0) risks.push('sem agendamentos');
  if(!hasPlanValue) risks.push('sem plano configurado');
  const health=Math.max(6,Math.round((presence*.45)+(Math.min(monthAppts.length,30)/30*25)+(Math.min(barbers.length,5)/5*15)+(Math.min(services.length,8)/8*15)));
  return {id,name:shop.name||id,shop,appts:safeAppts,services,barbers,status,plan,planValue,hasPlanValue,createdAt:shop.createdAt||0,presence,profileQuality,health,revenue,monthRevenue,monthAppts,todayAppts,online,onlineMonth,risks,lastAppt,lastActivity:lastAppt?.criadoEm||shop.createdAt||0,trial:shop.trial===true||status==='trial',blocked:status==='blocked',pastDue:status==='past_due'};
}
function totals(){
  const c=STATE.companies;
  const active=c.filter(x=>!x.blocked).length;
  const mrr=c.filter(x=>!x.blocked).reduce((s,x)=>s+(Number(x.planValue)||0),0);
  const mrrConfigured=c.filter(x=>x.hasPlanValue&&!x.blocked).length;
  const totalAppts=c.reduce((s,x)=>s+x.appts.length,0);
  const monthRevenue=c.reduce((s,x)=>s+x.monthRevenue,0);
  const online=c.reduce((s,x)=>s+x.online,0);
  const onlineMonth=c.reduce((s,x)=>s+x.onlineMonth,0);
  const trials=c.filter(x=>x.trial).length;
  const blocked=c.filter(x=>x.blocked).length;
  const pastDue=c.filter(x=>x.pastDue).length;
  return {active,mrr,mrrConfigured,totalAppts,monthRevenue,online,onlineMonth,trials,blocked,pastDue,total:c.length};
}
function filteredCompanies(){ let list=[...STATE.companies]; const q=STATE.filter.trim().toLowerCase(); if(q) list=list.filter(c=>`${c.name} ${c.id} ${c.plan} ${c.status}`.toLowerCase().includes(q)); if(STATE.status!=='all'){ if(STATE.status==='risk') list=list.filter(c=>c.health<65||c.risks.length>=3); else list=list.filter(c=>c.status===STATE.status || (STATE.status==='active'&&!c.blocked&&!c.trial&&!c.pastDue)); } return list; }

lick="showSection('companies')">Abrir</button></div>${STATE.companies.slice().sort((a,b)=>b.health-a.health).slice(0,4).map(companyCompactHTML).join('')||'<div class="empty">Nenhuma empresa cadastrada ainda.</div>'}</div></div>`; }

async function approveRequest(id){
  const r=STATE.requests.find(x=>x.id===id); if(!r) return toast('Solicitação não encontrada.');
  const slug=slugify(r.slug||r.name);
  if(hasCompanySlug(slug)) return toast('Já existe empresa com esse nome. Não aprovei para evitar duplicidade.');
  const pass=tempPassword();
  const shop={
    id:slug,
    name:r.name,
    slug,
    normalizedName:slug,
    gestorPassword:pass,
    whatsapp:r.whatsapp||'',
    instagram:r.instagram||'',
    city:r.city||'',
    address:'', hours:'', tagline:'', description:'', logo:null, coverPhoto:null,
    plan:r.plan||'Kroma Start', planName:r.plan||'Kroma Start', planValue:planValueFromName(r.plan),
    status:'trial', trial:true,
    services:defaultServices(), barbers:[], closedDates:[], createdAt:Date.now(), approvedAt:Date.now(), sourceRequestId:r.id,
    onboardingStatus:'pending'
  };
  try{
    await sSet('shop:'+slug, shop);
    await sSet('appts:'+slug, []);
    r.status='approved'; r.approvedAt=Date.now(); r.updatedAt=Date.now(); r.shopId=slug; r.tempPassword=pass;
    await saveRequests();
    closeModal();
    await loadMasterData();
    openModal(`<h2 style="font-family:'Plus Jakarta Sans';letter-spacing:-.05em;margin:0 0 8px">Empresa aprovada.</h2><p class="muted">${esc(r.name)} foi criada no banco real da Kroma.</p><div class="stack"><div class="insight"><strong>Código da loja:</strong><br>${esc(slug)}</div><div class="insight"><strong>Senha provisória:</strong><br>${esc(pass)}</div><button class="btn btn-primary" onclick="copyText('${slug}')">Copiar código da loja</button><button class="btn btn-outline" onclick="window.open('${companyLink(slug)}','_blank')">Abrir painel da empresa</button><button class="btn btn-outline" onclick="window.open('${landingLink(slug)}','_blank')">Abrir landing</button><button class="btn btn-outline" onclick="closeModal()">Fechar</button></div>`);
  }catch(e){ console.error(e); toast('Erro ao aprovar: '+(e?.message||e)); }
}

}

function companiesHTML(){ const list=filteredCompanies(); return `<div class="card"><div class="card-head"><div><div class="kicker">Empresas</div><h2>Todas as barbearias da Kroma</h2><p class="muted">Controle operacional, saúde, plano, presença digital e acesso de suporte.</p></div><button class="btn btn-primary" onclick="openCreateCompanyModal()">Nova empresa</button></div><div class="filters"><input class="input" placeholder="Buscar empresa, plano ou ID" value="${esc(STATE.filter)}" oninput="STATE.filter=this.value; renderMaster(); showSection('companies')"><select onchange="STATE.status=this.value; renderMaster(); showSection('companies')"><option value="all" ${STATE.status==='all'?'selected':''}>Todos os status</option><option value="active" ${STATE.status==='active'?'selected':''}>Ativas</option><option value="trial" ${STATE.status==='trial'?'selected':''}>Em teste</option><option value="past_due" ${STATE.status==='past_due'?'selected':''}>Inadimplentes</option><option value="blocked" ${STATE.status==='blocked'?'selected':''}>Bloqueadas</option><option value="risk" ${STATE.status==='risk'?'selected':''}>Em risco</option></select></div><div class="grid">${list.map(companyCardHTML).join('')||'<div class="empty">Nenhuma empresa encontrada.</div>'}</div></div>`; }
function companyCardHTML(c){ const statusClass=c.blocked?'red':c.pastDue?'gold':c.trial?'cyan':'green'; return `<div class="company-card"><div class="company-top"><div><div class="company-name">${esc(c.name)}</div><div class="company-id">${esc(c.id)}</div></div><div class="badges"><span class="badge ${statusClass}">${esc(c.status)}</span><span class="badge gold">${esc(c.plan)}</span><span class="badge ${c.health>=75?'green':c.health>=50?'gold':'red'}">${c.health}% saúde</span></div></div><div class="health" style="--w:${c.health}%"><span></span></div><div class="company-stats"><div class="mini"><span>MRR</span><strong>${brl(c.planValue)}</strong></div><div class="mini"><span>Mês</span><strong>${brl(c.monthRevenue)}</strong></div><div class="mini"><span>Agend.</span><strong>${c.appts.length}</strong></div><div class="mini"><span>Presença</span><strong>${c.presence}%</strong></div></div><div class="muted" style="font-size:13px">${c.risks.length?`Atenção: ${esc(c.risks.slice(0,4).join(', '))}.`:'Perfil saudável. Empresa pronta para operar e divulgar.'}</div><div class="row"><button class="btn btn-sm btn-outline" onclick="openCompanyDetail('${c.id}')">Detalhes</button><button class="btn btn-sm btn-outline" onclick="window.open('${companyLink(c.id)}','_blank')">Painel</button><button class="btn btn-sm btn-outline" onclick="window.open('${landingLink(c.id)}','_blank')">Landing</button><button class="btn btn-sm ${c.blocked?'btn-cyan':'btn-danger'}" onclick="confirmToggleBlock('${c.id}')">${c.blocked?'Desbloquear':'Bloquear'}</button></div></div>`; }
function openCompanyDetail(id){ const c=STATE.companies.find(x=>x.id===id); if(!c) return; openModal(`<div class="brand"><div class="mark">${esc(initials(c.name))}</div><div><strong>${esc(c.name)}</strong><span>${esc(c.id)}</span></div></div><div class="grid grid-2" style="margin-top:18px"><div class="metric"><span>Saúde</span><strong>${c.health}%</strong><small>${c.risks.length?esc(c.risks.join(', ')):'Sem riscos críticos'}</small></div><div class="metric"><span>MRR</span><strong>${brl(c.planValue)}</strong><small>${esc(c.plan)} · ${esc(c.status)}</small></div></div><div class="insight" style="margin-top:14px"><strong>Resumo Kroma:</strong><br>${companyNarrative(c)}</div><div class="row" style="margin-top:16px"><button class="btn btn-primary" onclick="window.open('${companyLink(c.id)}','_blank')">Abrir painel</button><button class="btn btn-outline" onclick="window.open('${landingLink(c.id)}','_blank')">Abrir landing</button><button class="btn btn-outline" onclick="closeModal()">Fechar</button></div>`); }
function companyNarrative(c){ return `${c.name} está com ${c.presence}% de presença digital, ${c.barbers.length} profissional(is), ${c.services.length} serviço(s) e ${c.appts.length} agendamento(s) registrados. ${c.health<65?'Recomendo contato de suporte para concluir onboarding e evitar churn.':'A empresa está com boa base para operar e divulgar.'}`; }
function confirmToggleBlock(id){ const c=STATE.companies.find(x=>x.id===id); if(!c) return; const action=c.blocked?'desbloquear':'bloquear'; openModal(`<h2 style="font-family:'Plus Jakarta Sans';letter-spacing:-.05em;margin:0 0 8px">${action[0].toUpperCase()+action.slice(1)} empresa?</h2><p class="muted">${esc(c.name)} será marcada como ${c.blocked?'ativa':'bloqueada'} no mesmo objeto da empresa no banco atual.</p><div class="row" style="margin-top:16px"><button class="btn ${c.blocked?'btn-cyan':'btn-danger'}" onclick="toggleBlock('${c.id}')">Confirmar</button><button class="btn btn-outline" onclick="closeModal()">Cancelar</button></div>`); }
async function toggleBlock(id){ const c=STATE.companies.find(x=>x.id===id); if(!c) return; try{ c.shop.status=c.blocked?'active':'blocked'; await sSet('shop:'+id,c.shop); closeModal(); await loadMasterData(); toast(c.blocked?'Empresa desbloqueada.':'Empresa bloqueada.'); }catch(e){ console.error(e); toast('Erro ao salvar status.'); } }
function openCreateCompanyModal(){ openModal(`<h2 style="font-family:'Plus Jakarta Sans';letter-spacing:-.05em;margin:0 0 8px">Cadastro fechado</h2><p class="muted">Novas empresas devem entrar pela solicitação de acesso no app principal e só depois serem aprovadas pelo Master. Isso evita duplicidade e mantém a Kroma premium.</p><div class="row" style="margin-top:16px"><button class="btn btn-primary" onclick="showSection('approvals'); closeModal();">Ver aprovações</button><button class="btn btn-outline" onclick="window.open('${baseDir()+MAIN_APP_FILE}','_blank')">Abrir solicitação</button><button class="btn btn-outline" onclick="closeModal()">Fechar</button></div>`); }

function subscriptionsHTML(){ const t=totals(); const plans={}; STATE.companies.forEach(c=>{ plans[c.plan]=(plans[c.plan]||0)+1; }); return `<div class="hero"><div class="hero-inner"><div><div class="kicker">Assinaturas</div><h1>Quanto a Kroma está gerando?</h1><p class="story">O MRR configurado é <strong>${brl(t.mrr)}</strong>. Existem <strong>${t.trials}</strong> empresas em teste, <strong>${t.pastDue}</strong> inadimplentes e <strong>${t.blocked}</strong> bloqueadas.</p></div><div class="hero-card"><span>ARR configurado</span><strong>${brl(t.mrr*12)}</strong><small>baseado no plano atual das empresas</small></div></div></div><div class="grid grid-3"><div class="card"><h2>Planos</h2>${Object.entries(plans).map(([p,n])=>`<div class="risk"><strong>${esc(p)}</strong><span class="badge gold">${n} empresa(s)</span></div>`).join('')||'<div class="empty">Sem planos ativos.</div>'}</div><div class="card"><h2>Inadimplência</h2>${STATE.companies.filter(c=>c.pastDue||c.blocked).map(companyCompactHTML).join('')||'<div class="empty">Nenhuma empresa inadimplente no momento.</div>'}</div><div class="card"><h2>Próxima ação</h2><div class="insight"><strong>Insight Kroma:</strong><br>Empresas que não completam onboarding tendem a cancelar mais rápido. Vincule cobrança com ativação: landing pronta, equipe cadastrada e primeiro agendamento online.</div></div></div>`; }
function growthHTML(){
  const t=totals();
  const realOnline=t.onlineMonth;
  const series=lastMonthsOnlineSeries();
  return `<div class="hero"><div class="hero-inner"><div><div class="kicker">Crescimento real</div><h1>O produto está ajudando as barbearias a vender?</h1><p class="story">Neste mês, as empresas geraram <strong>${realOnline}</strong> agendamentos online/Instagram registrados no banco. Visualizações da landing, cliques no WhatsApp e taxa de conversão ainda precisam de tracking próprio para serem métricas reais.</p></div><div class="hero-card"><span>Agendamentos online no mês</span><strong>${realOnline}</strong><small>fonte real: origem do agendamento em appts:*</small></div></div></div><div class="grid grid-2"><div class="card"><div class="card-head"><div><div class="kicker">Aquisição</div><h2>Online por mês</h2><p class="muted">Baseado apenas nos agendamentos salvos com origem Instagram/Online/Landing.</p></div></div><div class="bar-chart">${series.map(x=>`<div class="bar" title="${esc(x.label)}: ${x.value}" style="--h:${x.height}%"></div>`).join('')}</div></div><div class="card"><h2>Empresas com melhor tração</h2>${STATE.companies.slice().sort((a,b)=>b.onlineMonth-a.onlineMonth).slice(0,8).map(c=>`<div class="risk"><div><strong>${esc(c.name)}</strong><div class="muted" style="font-size:12px">${c.onlineMonth} online no mês · ${c.presence}% presença</div></div><button class="btn btn-sm btn-outline" onclick="openCompanyDetail('${c.id}')">Ver</button></div>`).join('')||'<div class="empty">Sem agendamentos online reais neste mês.</div>'}<div class="insight" style="margin-top:14px"><strong>Próxima evolução:</strong><br>Adicionar tabela de eventos para registrar visitas da landing, cliques no WhatsApp, cliques no Instagram e conversão. Sem esse tracking, o Master não deve inventar números.</div></div></div>`;
}
function lastMonthsOnlineSeries(){
  const months=[];
  const now=new Date();
  for(let i=11;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push({key:`${d.getFullYear()}-${pad2(d.getMonth()+1)}`,label:`${pad2(d.getMonth()+1)}/${String(d.getFullYear()).slice(2)}`,value:0}); }
  STATE.companies.forEach(c=>c.appts.forEach(a=>{ const origem=(a.origem||'').toLowerCase(); const isOnline=origem.includes('instagram')||origem.includes('online')||origem.includes('landing'); if(!isOnline) return; const key=(a.date||'').slice(0,7); const m=months.find(x=>x.key===key); if(m) m.value++; }));
  const max=Math.max(1,...months.map(x=>x.value));
  return months.map(x=>({...x,height:Math.max(8,Math.round((x.value/max)*100))}));
}
function risksHTML(){ const risks=STATE.companies.filter(c=>c.health<75||c.risks.length>=2).sort((a,b)=>a.health-b.health); return `<div class="hero"><div class="hero-inner"><div><div class="kicker">Riscos</div><h1>O que pode virar churn?</h1><p class="story">A Kroma deve agir antes do cliente reclamar. Empresa sem equipe, sem foto, sem serviços ou sem agendamentos precisa de suporte proativo.</p></div><div class="hero-card"><span>Empresas em atenção</span><strong>${risks.length}</strong><small>saúde abaixo do ideal ou onboarding incompleto</small></div></div></div><div class="card"><h2>Fila de atenção do CEO/Suporte</h2><div class="grid">${risks.map(c=>`<div class="company-card"><div class="company-top"><div><div class="company-name">${esc(c.name)}</div><div class="company-id">${esc(c.risks.join(', '))}</div></div><span class="badge ${c.health>=60?'gold':'red'}">${c.health}% saúde</span></div><div class="health" style="--w:${c.health}%"><span></span></div><div class="insight"><strong>Próxima melhor ação:</strong><br>${riskAction(c)}</div><div class="row"><button class="btn btn-sm btn-outline" onclick="openCompanyDetail('${c.id}')">Detalhes</button><button class="btn btn-sm btn-primary" onclick="copyText('${landingLink(c.id)}')">Copiar landing</button></div></div>`).join('')||'<div class="empty">Nenhum risco crítico agora.</div>'}</div></div>`; }
function riskAction(c){ if(c.barbers.length===0) return 'Chamar o dono e orientar cadastro da equipe. Sem barbeiros, a landing não cria confiança.'; if(!c.shop.coverPhoto) return 'Solicitar foto da fachada/ambiente para aumentar percepção de profissionalismo.'; if(c.services.length===0) return 'Ajudar a cadastrar serviços com preço e duração para liberar agendamentos.'; if(c.appts.length===0) return 'Enviar sugestão de divulgação do link na bio/WhatsApp e acompanhar primeira conversão.'; return 'Revisar onboarding, plano e uso. Empresa pode precisar de suporte consultivo.'; }
function logsHTML(){
  const events=[];
  STATE.companies.forEach(c=>{
    if(c.createdAt) events.push({t:c.createdAt,msg:`Empresa criada: ${c.name}`,type:'company'});
    if(c.lastActivity) events.push({t:c.lastActivity,msg:`Último agendamento em ${c.name}`,type:'appointment'});
    if(c.blocked) events.push({t:Date.now()-3600000,msg:`Empresa bloqueada: ${c.name}`,type:'billing'});
  });
  events.sort((a,b)=>b.t-a.t);
  const aiRows=STATE.rows.filter(r=>r&&r.key&&(r.key.startsWith('ai:')||r.key.startsWith('ai_usage:')||r.key.startsWith('ia:')));
  const aiCalls=aiRows.length;
  return `<div class="hero"><div class="hero-inner"><div><div class="kicker">Logs & IA</div><h1>O que aconteceu na operação?</h1><p class="story">Esta tela mostra eventos derivados dos dados reais já existentes. Uso de IA só aparece quando houver registros reais no banco, sem simulação.</p></div><div class="hero-card"><span>Registros reais de IA</span><strong>${aiCalls}</strong><small>${aiCalls?'lidos do storage':'tracking de IA ainda não instalado'}</small></div></div></div><div class="grid grid-2"><div class="card"><h2>Eventos recentes derivados</h2>${events.slice(0,14).map(e=>`<div class="risk"><div><strong>${esc(e.msg)}</strong><div class="muted" style="font-size:12px">${daysAgo(e.t)} · ${esc(e.type)}</div></div><span class="badge cyan">real</span></div>`).join('')||'<div class="empty">Nenhum evento encontrado no banco real.</div>'}</div><div class="card"><h2>Métricas ainda não instaladas</h2><div class="insight"><strong>Sem números inventados:</strong><br>Para controlar custo de IA, visitas da landing, cliques e conversão, precisamos gravar eventos reais no banco. Até isso existir, o Master mostra apenas o que o sistema realmente salva.</div><div class="row" style="margin-top:14px"><button class="btn btn-sm btn-outline" onclick="exportData()">Baixar backup técnico JSON</button></div></div></div>`;
}

function exportData(){
  const blob=new Blob([JSON.stringify({companies:STATE.companies,rows:STATE.rows,source:'kroma_storage_real',exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kroma-master-backup-tecnico-real.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Backup técnico real gerado.');
}
function logoutMaster(){ localStorage.removeItem('kroma_master_ok'); STATE.authed=false; renderGate(); }


// ===== KROMA SUBSCRIPTION ENGINE (CORE) =====
function getToday(){
  return new Date();
}

function diffDays(date){
  if(!date) return null;
  return Math.ceil((new Date(date) - new Date())/(1000*60*60*24));
}

function getCompanyStatus(c){
  const now = getToday();

  if(c.status === 'blocked') return 'blocked';

  if(c.trial_end_date && now > new Date(c.trial_end_date)){
    if(!c.subscription_end_date) return 'expired';
  }

  if(c.subscription_end_date && now > new Date(c.subscription_end_date)){
    return 'expired';
  }

  return c.status || 'active';
}

function getRemainingDays(c){
  if(c.subscription_end_date){
    return diffDays(c.subscription_end_date);
  }
  if(c.trial_end_date){
    return diffDays(c.trial_end_date);
  }
  return null;
}

function formatCompanyLabel(c){
  const status = getCompanyStatus(c);
  const days = getRemainingDays(c);

  let badge = '';
  if(status === 'trial') badge = `🟡 Trial (${days ?? 0}d)`;
  if(status === 'active') badge = `🟢 Ativo`;
  if(status === 'expired') badge = `🔴 Expirado`;
  if(status === 'blocked') badge = `⛔ Bloqueado`;

  return badge;
}

function enforceSubscription(c){
  const status = getCompanyStatus(c);
  if(status === 'expired'){
    c.status = 'expired';
  }
  return c;
}
// ===== END SUBSCRIPTION ENGINE =====


(function init(){ STATE.authed=localStorage.getItem('kroma_master_ok')==='1'; if(!STATE.authed) renderGate(); else loadMasterData(); })();
