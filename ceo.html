<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Kroma Master</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#0b0f14;
  color:white;
  padding:20px;
}

h1{
  color:#00d4ff;
}

.company-card{
  background:#121a24;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #1f2a3a;
}
.status{
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🔥 KROMA MASTER</h1>

<div id="companiesList">Carregando empresas...</div>

<script>
/* ================================
   1. SUPABASE CONFIG
================================ */
const SUPABASE_URL = "https://pwbezybolmcmxkhlrwla.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_49LRg9PEBlVGXsFG8R_vAQ_CZuwy0SD";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


/* ================================
   2. DIAS RESTANTES
================================ */
function getDiasRestantes(dataFim){
  if(!dataFim) return 0;

  const hoje = new Date();
  const fim = new Date(dataFim);

  const diff = fim - hoje;

  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}


/* ================================
   3. STATUS DA EMPRESA
================================ */
function calcularStatus(c){
  const hoje = new Date();

  if(c.status === "blocked") return "Bloqueado";

  if(c.trial_end_date && new Date(c.trial_end_date) > hoje && !c.subscription_start_date){
    return "Trial";
  }

  if(c.trial_end_date && new Date(c.trial_end_date) < hoje && !c.subscription_start_date){
    return "Trial Expirado";
  }

  if(c.subscription_end_date && new Date(c.subscription_end_date) < hoje){
    return "Expirado";
  }

  return "Ativo";
}


/* ================================
   4. BUSCAR EMPRESAS
================================ */
async function carregarEmpresas(){

  const { data, error } = await client
    .from("companies")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    document.getElementById("companiesList").innerHTML = "Erro ao carregar";
    return;
  }

  renderEmpresas(data);
}


/* ================================
   5. RENDER UI
================================ */
function renderEmpresas(empresas){

  const container = document.getElementById("companiesList");
  container.innerHTML = "";

  empresas.forEach(c => {

    const status = calcularStatus(c);
    const dias = getDiasRestantes(
      c.subscription_end_date || c.trial_end_date
    );

    const card = document.createElement("div");
    card.className = "company-card";

    card.innerHTML = `
      <h2>${c.name || "Sem nome"}</h2>

      <p class="status">Status: ${status}</p>

      <p>Dias restantes: <b>${dias}</b></p>

      <p>Plano: ${c.plan || "—"}</p>

      <small>ID: ${c.id}</small>
    `;

    container.appendChild(card);
  });
}


/* ================================
   6. INIT
================================ */
document.addEventListener("DOMContentLoaded", ()=>{
  carregarEmpresas();
});
</script>

</body>
</html>
